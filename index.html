// ─── STORAGE SERVICE — persistência garantida ────────────────────────────────
// Comprime imagens base64 para reduzir tamanho antes de salvar
const comprimirFotos = (data) => {
  if (!data) return data;
  if (Array.isArray(data)) {
    return data.map(item => {
      if (typeof item !== "object" || item === null) return item;
      const novo = {...item};
      // Comprime arrays de fotos (produtos, projetos, etc)
      if (Array.isArray(novo.photos)) {
        novo.photos = novo.photos.map(f => {
          if (!f || !f.startsWith("data:image")) return f;
          // Já está pequeno o suficiente
          if (f.length < 50000) return f;
          // Reduz qualidade via canvas
          try {
            const img = new Image();
            img.src = f;
            const canvas = document.createElement("canvas");
            const maxW = 400;
            const ratio = maxW / (img.width || maxW);
            canvas.width = Math.min(img.width || maxW, maxW);
            canvas.height = (img.height || maxW) * ratio;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL("image/jpeg", 0.5);
          } catch { return f; }
        });
      }
      // Comprime foto individual (depoimentos, banners, stock)
      if (novo.foto && novo.foto.startsWith("data:image") && novo.foto.length > 50000) {
        try {
          const img = new Image();
          img.src = novo.foto;
          const canvas = document.createElement("canvas");
          canvas.width = 200; canvas.height = 200;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, 200, 200);
          novo.foto = canvas.toDataURL("image/jpeg", 0.5);
        } catch {}
      }
      return novo;
    });
  }
  if (typeof data === "object" && data !== null) {
    const novo = {...data};
    if (novo.fotoArtesa && novo.fotoArtesa.startsWith("data:image") && novo.fotoArtesa.length > 50000) {
      try {
        const img = new Image();
        img.src = novo.fotoArtesa;
        const canvas = document.createElement("canvas");
        canvas.width = 300; canvas.height = 300;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, 300, 300);
        novo.fotoArtesa = canvas.toDataURL("image/jpeg", 0.6);
      } catch {}
    }
    return novo;
  }
  return data;
};

// Verifica espaço disponível no localStorage
const verificarEspaco = () => {
  try {
    let total = 0;
    for (let k in localStorage) {
      if (localStorage.hasOwnProperty(k)) total += localStorage[k].length * 2;
    }
    return total; // bytes usados
  } catch { return 0; }
};

const useStorage = (key, initial) => {
  const K = "atelie_" + key;

  const [val, setVal] = useState(() => {
    try {
      const s = localStorage.getItem(K);
      if (s !== null && s !== "") return JSON.parse(s);
      // Tenta backup
      const bk = localStorage.getItem(K + "_bk");
      if (bk !== null && bk !== "") return JSON.parse(bk);
      return initial;
    } catch { return initial; }
  });

  const set = useCallback(u => {
    setVal(prev => {
      const next = typeof u === "function" ? u(prev) : u;
      // Tenta salvar normalmente
      try {
        const str = JSON.stringify(next);
        localStorage.setItem(K, str);
        localStorage.setItem(K + "_bk", str);
      } catch(e) {
        // Se falhou por espaço, comprime fotos e tenta de novo
        console.warn(`[Storage] Espaço insuficiente para "${key}", comprimindo fotos...`);
        try {
          const comprimido = comprimirFotos(next);
          const str2 = JSON.stringify(comprimido);
          localStorage.setItem(K, str2);
          localStorage.setItem(K + "_bk", str2);
          console.info(`[Storage] "${key}" salvo após compressão.`);
        } catch(e2) {
          // Última tentativa: remove fotos completamente
          try {
            const semFotos = JSON.parse(JSON.stringify(next));
            const limpo = Array.isArray(semFotos)
              ? semFotos.map(i => ({...i, photos:[], foto:"", fotoArtesa:""}))
              : {...semFotos, fotoArtesa:""};
            localStorage.setItem(K, JSON.stringify(limpo));
            console.error(`[Storage] "${key}" salvo SEM fotos. localStorage cheio!`);
          } catch(e3) {
            console.error(`[Storage] FALHA CRÍTICA ao salvar "${key}":`, e3);
          }
        }
      }
      return next;
    });
  }, [K]);

  return [val, set];
};

// ─── PRODUTOS ─────────────────────────────────────────────────────────────────
const calcPreco = (custo,horas,valorHora,margem) => {
  const mo=horas*valorHora;
  const sub=custo+mo;
  return Math.ceil((sub+sub*(margem/100))/5)*5;
};

const Products = ({products,setProducts,categories,config,stockSup}) => {
  const [search,setSearch]=useState("");
  const [catF,setCatF]=useState("Todos");
  const [modal,setModal]=useState(null);
  const EF={name:"",category:categories[0]||"Moda",subcategory:"",type:"encomenda",price:0,cost:0,hours:0,margem:40,desc:"",buffer:2,img:"🧶",photos:[],stock:0,materiais:[],tamanhos:[],cores:[],valorPorTamanho:[]};
  const [form,setForm]=useState(EF);
  const allCats=["Todos",...categories];
  const filtered=products.filter(p=>(catF==="Todos"||p.category===catF)&&p.name.toLowerCase().includes(search.toLowerCase()));
  const custoMat=(form.materiais||[]).reduce((sum,m)=>{const it=stockSup.find(s=>s.id===m.itemId);return sum+(it?.custoUnitario||0)*Number(m.qtd||0);},0);
  const custoFinal=form.materiais?.length>0?custoMat:Number(form.cost||0);
  const precoSug=calcPreco(custoFinal,Number(form.hours||0),config.valorHora,Number(form.margem||40));
  const SUBS={Moda:["Blusas","Coletes","Toucas","Cachecóis","Acessórios"],Casa:["Jogos de banheiro","Panos de prato","Decoração"],Amigurumi:["Bichinhos","Personagens"]};

  const save=()=>{
    const p={...form,price:Number(form.price)>0?Number(form.price):precoSug,cost:custoFinal,hours:Number(form.hours||0),stock:Number(form.stock||0),buffer:Number(form.buffer||2),margem:Number(form.margem||40)};
    if(modal==="new")setProducts(prev=>[...prev,{...p,id:uid(),sales:0}]);
    else setProducts(prev=>prev.map(x=>x.id===p.id?p:x));
    setModal(null);
  };

  return (
    <div className="fade" style={{padding:24}}>
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{flex:1,minWidth:160}}><Inp value={search} onChange={setSearch} placeholder="Buscar produto..."/></div>

      </div>
      <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:14}}>
        {allCats.map(c=><button key={c} onClick={()=>setCatF(c)} style={{padding:"4px 13px",borderRadius:20,border:`1.5px solid ${catF===c?C.cafe:C.areia}`,background:catF===c?C.cafe:"transparent",color:catF===c?"#fff":C.cafe,fontSize:11,fontWeight:600,cursor:"pointer"}}>{c}</button>)}
      </div>
      {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:C.oliva,fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:15}}>Nenhum produto cadastrado ainda. Toque em "+ Novo Produto" ✦</div>}
      <style>{`.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}@media(max-width:600px){.pg{grid-template-columns:repeat(2,1fr);gap:10px;}}`}</style>
      <div className="pg">
        {filtered.map(p=>(
          <div key={p.id} className="ch" style={{background:C.branco,border:`1px solid ${C.areia}`,borderRadius:8,overflow:"hidden"}}>
            <ProdPhoto photos={p.photos} emoji={p.img} size={120}/>
            <div style={{padding:"10px 12px"}}>

                <div style={{width:80}}>
                  <label style={{fontSize:10,fontWeight:600,color:C.oliva,textTransform:"uppercase",display:"block",marginBottom:2}}>Qtd</label>
                  <input type="number" value={m.qtd} onChange={e=>setForm(f=>{const n=[...f.materiais];n[idx]={...n[idx],qtd:e.target.value};return{...f,materiais:n};})} style={{width:"100%",padding:"7px 10px",border:`1.5px solid ${C.areia}`,borderRadius:3,fontSize:12,color:C.cafe}}/>
                </div>
                <Btn sm v="danger" onClick={()=>setForm(f=>({...f,materiais:f.materiais.filter((_,i)=>i!==idx)}))}>✕</Btn>
              </div>
            );
          })}
          <Btn sm v="ghost" onClick={()=>setForm(f=>({...f,materiais:[...(f.materiais||[]),{itemId:"",qtd:1}]}))}>+ Material</Btn>

          <Divider label="Precificação"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {(!form.materiais?.length)&&<Inp label="Custo materiais (R$)" type="number" value={form.cost} onChange={v=>setForm(f=>({...f,cost:v}))}/>}
            <Inp label="Horas de produção" type="number" value={form.hours} onChange={v=>setForm(f=>({...f,hours:v}))}/>
            <Inp label="Margem de lucro (%)" type="number" value={form.margem} onChange={v=>setForm(f=>({...f,margem:v}))}/>
            <Inp label="Preço final (0 = sugerido)" type="number" value={form.price} onChange={v=>setForm(f=>({...f,price:v}))}/>
            <Inp label="Buffer de dias extras" type="number" value={form.buffer} onChange={v=>setForm(f=>({...f,buffer:v}))}/>
          </div>
          {(custoFinal>0||Number(form.hours)>0)&&(
            <div style={{background:C.linho,borderRadius:4,padding:"10px 14px",marginTop:10}}>
              <div style={{fontSize:10,fontWeight:700,color:C.oliva,letterSpacing:"1px",textTransform:"uppercase",marginBottom:5}}>Precificação inteligente</div>
              <div style={{display:"flex",gap:12,flexWrap:"wrap",fontSize:11,marginBottom:4}}>
                <span>Materiais: <b>{fmtBRL(custoFinal)}</b></span>
                <span>Mão de obra: <b>{fmtBRL(Number(form.hours||0)*config.valorHora)}</b></span>
                <span>Margem: <b>{form.margem||40}%</b></span>
              </div>
              <div style={{fontSize:14,fontWeight:700,color:C.dourado}}>Preço sugerido: {fmtBRL(precoSug)}</div>
            </div>
          )}
          <div style={{display:"flex",gap:10,marginTop:16,justifyContent:"flex-end"}}>
            <Btn v="ghost" onClick={()=>setModal(null)}>Cancelar</Btn>
            <Btn onClick={save}>Salvar produto</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ─── ENCOMENDAS ───────────────────────────────────────────────────────────────
const reorderQ = orders => {
  const active=orders.filter(o=>!["Concluído","Cancelado","Enviado"].includes(o.status)).sort((a,b)=>(a.position||999)-(b.position||999));
  let pos=1;
  const reordered=active.map(o=>({...o,position:pos++}));
  return orders.map(o=>{const r=reordered.find(x=>x.id===o.id);return r||o;});
};

const calcParcs = (dataInicio,qtd,valor) => Array.from({length:qtd},(_,i)=>({n:i+1,data:addDays(dataInicio,30*(i+1)),valor:Number((valor/qtd).toFixed(2)),pago:false}));

// Busca de cliente com autocomplete
const ClienteSearch = ({value,onChange,onPhoneChange,clients}) => {
  const [query,setQuery]=useState(value||"");
  const [open,setOpen]=useState(false);
  const found=clients.filter(c=>c.name.toLowerCase().includes(query.toLowerCase())).slice(0,6);
  return (
    <div style={{position:"relative"}}>
      <label style={{fontSize:11,fontWeight:600,letterSpacing:"0.8px",color:C.oliva,textTransform:"uppercase",display:"block",marginBottom:4}}>Cliente</label>
      <input value={query} onChange={e=>{setQuery(e.target.value);onChange(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),150)} placeholder="Buscar ou digitar novo nome..." style={{width:"100%",background:C.branco,border:`1.5px solid ${C.areia}`,borderRadius:3,padding:"9px 13px",fontSize:13,color:C.cafe,outline:"none"}}/>
      {open&&found.length>0&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:C.branco,border:`1.5px solid ${C.areia}`,borderRadius:4,zIndex:50,maxHeight:200,overflowY:"auto",boxShadow:"0 4px 16px rgba(92,64,51,0.15)"}}>
          {found.map(c=>(
            <div key={c.id} onMouseDown={()=>{setQuery(c.name);onChange(c.name);onPhoneChange(c.phone||"");setOpen(false);}} style={{padding:"8px 14px",cursor:"pointer",fontSize:13,borderBottom:`1px solid ${C.linho}`}}>
              <div style={{fontWeight:600}}>{c.name}</div>
              <div style={{fontSize:11,color:C.oliva}}>{c.phone}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

const Orders = ({orders,setOrders,products,config,onFicha,clients,setClients,finance,setFinance,contas,setContas}) => {
  const [filter,setFilter]=useState("Ativos");
  const [modal,setModal]=useState(null);
  const [baixaModal,setBaixaModal]=useState(null);
  const [detail,setDetail]=useState(null);
  const EF={client:"",phone:"",origem:"WhatsApp",product:"",color:"",size:"",measures:"",price:0,desconto:0,tipoDesc:"valor",precoFinal:0,dataCompra:today,delivery:"",status:"Pedido recebido",valorPago:0,note:"",tracking:"",payment:"PIX",condicao:"À vista",entrada:0,dataEntradaPag:today,dataSaldo:"",parcelas:[],qtdParcelas:2,position:1};
  const [form,setForm]=useState(EF);

  const filtered=filter==="Ativos"?orders.filter(o=>!["Concluído","Cancelado","Enviado"].includes(o.status)):filter==="Todos"?orders:orders.filter(o=>o.status===filter);
  const unread=orders.filter(o=>!o.read).length;

  const precoComDesc=(price,desc,tipo)=>{
    const p=Number(price||0),d=Number(desc||0);
    return tipo==="pct"?p*(1-d/100):Math.max(0,p-d);
  };

  const openNew=()=>{
    const pos=orders.filter(o=>!["Concluído","Cancelado","Enviado"].includes(o.status)).length+1;
    setForm({...EF,position:pos,id:`EN-${String(orders.length+1).padStart(3,"0")}`});
    setModal("new");
  };
  const openEdit=o=>{setForm({...EF,...o,parcelas:o.parcelas||[],desconto:o.desconto||0,tipoDesc:o.tipoDesc||"valor"});setModal("edit");};

  const save=()=>{
    const pF=precoComDesc(form.price,form.desconto,form.tipoDesc);
    let o={...form,price:Number(form.price),precoFinal:pF};
    if(o.condicao==="Parcelado"&&(!o.parcelas||!o.parcelas.length)){
      o.parcelas=calcParcs(o.dataCompra||today,Number(o.qtdParcelas)||2,pF);
    }
    if(o.condicao==="À vista"){o.entrada=pF;o.valorPago=pF;}

    if(modal==="new"){
      setOrders(prev=>reorderQ([...prev,{...o,read:true,historicoPagamentos:[],valorPago:o.condicao==="À vista"?pF:Number(o.entrada||0)}]));
      // Auto-cadastra cliente
      if(o.client&&!clients.find(c=>c.name===o.client)){
        setClients(prev=>[...prev,{id:uid(),name:o.client,phone:o.phone,email:"",city:"",orders:1,total:pF,vip:false,joined:today,origem:o.origem}]);
      }
      // Auto-lança no financeiro
      const prod=products.find(p=>p.name===o.product);
      const cat=prod?.category||"Moda";
      if(o.condicao==="À vista"){
        setFinance(prev=>[...prev,{id:uid(),type:"receita",desc:`${o.id} – ${o.product}`,value:pF,date:o.dataCompra,category:cat,centrocusto:"Vendas",pago:true,contaId:contas[0]?.id||"",orderId:o.id,clientName:o.client,dataLancamento:o.dataCompra,dataVencimento:o.dataCompra,payment:o.payment}]);
        if(contas[0]?.id&&setContas)setContas(prev=>prev.map(c=>c.id===contas[0].id?{...c,saldo:(c.saldo||0)+pF}:c));
      } else {
        if(Number(o.entrada)>0){
          setFinance(prev=>[...prev,{id:uid(),type:"receita",desc:`${o.id} – Entrada – ${o.client}`,value:Number(o.entrada),date:o.dataEntradaPag||o.dataCompra,category:cat,centrocusto:"Vendas",pago:true,contaId:"",orderId:o.id,clientName:o.client,dataLancamento:o.dataCompra,dataVencimento:o.dataEntradaPag||o.dataCompra,payment:o.payment}]);
        }
        const saldoPend=pF-Number(o.entrada||0);
        if(saldoPend>0){
          setFinance(prev=>[...prev,{id:uid(),type:"receita",desc:`${o.id} – Saldo – ${o.client}`,value:saldoPend,date:o.dataCompra,category:cat,centrocusto:"Vendas",pago:false,contaId:"",orderId:o.id,clientName:o.client,dataLancamento:o.dataCompra,dataVencimento:o.dataSaldo||o.delivery||o.dataCompra,payment:o.payment}]);
        }
      }
    } else {
      setOrders(prev=>reorderQ(prev.map(x=>x.id===o.id?o:x)));
    }
    setModal(null);
  };

  const doBaixa=(order,valor,data,contaId)=>{
    const novoPago=(order.valorPago||0)+Number(valor);
    const pF=order.precoFinal||order.price;
    const saldo=Math.max(0,pF-novoPago);
    setOrders(prev=>prev.map(o=>o.id===order.id?{...o,valorPago:novoPago,paid:saldo<=0,historicoPagamentos:[...(o.historicoPagamentos||[]),{data,valor:Number(valor),contaId}]}:o));
    setFinance(prev=>[...prev,{id:uid(),type:"receita",desc:`${order.id} – Baixa – ${order.client}`,value:Number(valor),date:data,category:"Moda",centrocusto:"Vendas",pago:true,contaId,orderId:order.id,clientName:order.client,dataLancamento:today,dataVencimento:data}]);
    if(contaId)setContas(prev=>prev.map(c=>c.id===contaId?{...c,saldo:(c.saldo||0)+Number(valor)}:c));
    setBaixaModal(null);
  };

  const cancelar=id=>setOrders(prev=>reorderQ(prev.map(o=>o.id===id?{...o,status:"Cancelado",read:true}:o)));

  const sendWA=o=>{
    const pF=o.precoFinal||o.price;
    const saldo=Math.max(0,pF-(o.valorPago||0));
    const msg=`Olá, ${o.client.split(" ")[0]}! 🤎\n\n*Pedido confirmado!*\n\nNº: ${o.id}\nProduto: ${o.product}\nCor: ${o.color||"—"} · Tamanho: ${o.size||"—"}\nValor: ${fmtBRL(pF)}${o.desconto>0?`\nDesconto: -${o.tipoDesc==="pct"?o.desconto+"%":fmtBRL(o.desconto)}`:""}${o.condicao==="Com entrada"?`\nEntrada: ${fmtBRL(o.entrada)}\nSaldo: ${fmtBRL(saldo)}\nData limite saldo: ${fmtDate(o.dataSaldo||o.delivery)}`:""}${o.condicao==="Parcelado"&&o.parcelas?.length?`\nParcelas:\n${o.parcelas.map(p=>`  ${p.n}ª: ${fmtBRL(p.valor)} em ${fmtDate(p.data)}`).join("\n")}`:""}\nFila: ${o.position}ª\nEntrega: ${fmtDate(o.delivery)}\n\n${BRAND}`;
    window.open(`https://wa.me/${o.phone?.replace(/\D/g,"")}?text=${waMsg(msg)}`);
  };

  const counts=[["Ativos",orders.filter(o=>!["Concluído","Cancelado","Enviado"].includes(o.status)).length],["Concluídos",orders.filter(o=>["Concluído","Enviado"].includes(o.status)).length],["Cancelados",orders.filter(o=>o.status==="Cancelado").length]];

  return (
    <div className="fade" style={{padding:24}}>
      {unread>0&&<div style={{background:"#FEF3E9",border:`1.5px solid ${C.dourado}`,borderRadius:6,padding:"10px 14px",marginBottom:14,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
        <span className="pulse" style={{fontSize:16}}>🔔</span>
        <span style={{fontSize:13,fontWeight:700,color:C.cafe}}>{unread} novo{unread!==1?"s":""} pedido{unread!==1?"s":""}!</span>
        <Btn sm v="ghost" onClick={()=>setOrders(prev=>prev.map(o=>({...o,read:true})))}>Marcar lido</Btn>
      </div>}
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
        {counts.map(([l,v])=><div key={l} style={{background:C.branco,border:`1px solid ${C.areia}`,borderRadius:6,padding:"6px 14px",textAlign:"center"}}><div style={{fontSize:18,fontWeight:700,fontFamily:"'Playfair Display',serif",color:C.cafe}}>{v}</div><div style={{fontSize:10,color:C.oliva}}>{l}</div></div>)}
        <div style={{marginLeft:"auto"}}><Btn onClick={openNew}>+ Nova Encomenda</Btn></div>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
        {["Ativos","Todos",...Object.keys(STATUS)].map(s=><button key={s} onClick={()=>setFilter(s)} style={{padding:"3px 11px",borderRadius:20,border:`1.5px solid ${filter===s?C.cafe:C.areia}`,background:filter===s?C.cafe:"transparent",color:filter===s?"#fff":C.cafe,fontSize:11,fontWeight:600,cursor:"pointer"}}>{s}</button>)}
      </div>
      {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:C.oliva,fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:15}}>Nenhum pedido aqui ✦</div>}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {filtered.map(o=>{
          const pF=o.precoFinal||o.price||0;
          const saldoAb=Math.max(0,pF-(o.valorPago||0));
          return (
            <Card key={o.id} style={{padding:"12px 16px",borderLeft:`4px solid ${!o.read&&o.status!=="Cancelado"?C.dourado:o.status==="Cancelado"?C.vermelho:"transparent"}`,opacity:o.status==="Cancelado"?0.7:1}}>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
                <div style={{flex:1,minWidth:140,cursor:"pointer"}} onClick={()=>{setOrders(prev=>prev.map(x=>x.id===o.id?{...x,read:true}:x));setDetail(o);}}>
                  <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:2}}>
                    <span style={{fontSize:11,fontWeight:700,color:C.dourado}}>{o.id}</span>
                    {!o.read&&o.status!=="Cancelado"&&<span className="pulse" style={{fontSize:8,background:C.dourado,color:"#fff",padding:"1px 5px",borderRadius:10,fontWeight:700}}>NOVO</span>}
                    {saldoAb<=0?<span style={{fontSize:9,background:"#D4E8D4",color:"#2E6B2E",padding:"1px 6px",borderRadius:10,fontWeight:700}}>PAGO</span>:o.valorPago>0?<span style={{fontSize:9,background:"#FEF3E9",color:"#9A6B40",padding:"1px 6px",borderRadius:10,fontWeight:700}}>PARCIAL</span>:<span style={{fontSize:9,background:"#FEF3E9",color:"#9A6B40",padding:"1px 6px",borderRadius:10,fontWeight:700}}>PENDENTE</span>}
                  </div>
                  <div style={{fontSize:13,fontWeight:700}}>{o.client}</div>
                  <div style={{fontSize:11,color:C.oliva}}>{o.product}{o.color?` · ${o.color}`:""}{o.size?` · ${o.size}`:""} · Fila: {o.position}ª</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:15,fontFamily:"'Playfair Display',serif",fontWeight:700,color:C.dourado}}>{fmtBRL(pF)}</div>
                  {saldoAb>0&&o.status!=="Cancelado"&&<div style={{fontSize:10,color:C.vermelho}}>Saldo: {fmtBRL(saldoAb)}</div>}
                  <div style={{fontSize:10,color:C.oliva}}>Entrega: {fmtDate(o.delivery)}</div>
                </div>
                <Badge label={o.status}/>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {o.status!=="Cancelado"&&<select value={o.status} onChange={e=>setOrders(prev=>reorderQ(prev.map(x=>x.id===o.id?{...x,status:e.target.value}:x)))} style={{padding:"4px 6px",border:`1px solid ${C.areia}`,borderRadius:3,fontSize:11,color:C.cafe,background:C.branco}}>
                    {Object.keys(STATUS).filter(s=>s!=="Cancelado").map(s=><option key={s}>{s}</option>)}
                  </select>}
                  {o.status!=="Cancelado"&&saldoAb>0&&<Btn sm v="oliva" onClick={()=>setBaixaModal(o)}>💰</Btn>}
                  <Btn sm v="ghost" onClick={()=>{setOrders(prev=>prev.map(x=>x.id===o.id?{...x,read:true}:x));openEdit(o);}}>✎</Btn>
                  {o.status!=="Cancelado"&&<Btn sm v="ghost" onClick={()=>sendWA(o)}>💬</Btn>}
                  {onFicha&&o.status!=="Cancelado"&&<Btn sm v="gold" onClick={()=>onFicha(o)}>📋</Btn>}
                  {o.status!=="Cancelado"&&<Btn sm v="danger" onClick={()=>{if(window.confirm(`Cancelar pedido ${o.id}?`))cancelar(o.id);}}>✕</Btn>}
                </div>
              </div>
              {o.note&&<div style={{fontSize:11,color:C.oliva,marginTop:5,fontStyle:"italic"}}>Obs: {o.note}</div>}
              {o.tracking&&<div style={{fontSize:11,color:C.oliva,marginTop:3}}>Rastreio: <b>{o.tracking}</b></div>}
              {o.historicoPagamentos?.length>0&&<div style={{marginTop:6,paddingTop:6,borderTop:`1px dashed ${C.areia}`}}>
                <div style={{fontSize:9,color:C.oliva,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",marginBottom:3}}>Histórico de pagamentos</div>
                {o.historicoPagamentos.map((h,i)=><span key={i} style={{fontSize:11,color:C.cafe,marginRight:10}}>{fmtDate(h.data)}: {fmtBRL(h.valor)}</span>)}
              </div>}
            </Card>
          );
        })}
      </div>

      {baixaModal&&(
        <Modal title={`Registrar pagamento — ${baixaModal.id}`} onClose={()=>setBaixaModal(null)}>
          <BaixaForm order={baixaModal} contas={contas} onConfirm={doBaixa}/>
        </Modal>
      )}

      {detail&&(
        <Modal title={`Pedido ${detail.id}`} onClose={()=>setDetail(null)} wide>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            {[["Cliente",detail.client],["WhatsApp",detail.phone],["Como chegou",detail.origem],["Produto",detail.product],["Cor",detail.color],["Tamanho",detail.size],["Medidas",detail.measures],["Pagamento",detail.payment],["Data compra",fmtDate(detail.dataCompra)],["Entrega",fmtDate(detail.delivery)]].map(([l,v])=>(
              <div key={l}><div style={{fontSize:9,color:C.oliva,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",marginBottom:1}}>{l}</div><div style={{fontSize:12,fontWeight:600}}>{v||"—"}</div></div>
            ))}
          </div>
          <div style={{background:C.linho,borderRadius:6,padding:"12px",marginBottom:10}}>
            <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
              <div><div style={{fontSize:9,color:C.oliva,textTransform:"uppercase",fontWeight:600,marginBottom:1}}>Posição</div><div style={{fontSize:20,fontFamily:"'Playfair Display',serif",fontWeight:700}}>{detail.position}ª</div></div>
              <div><div style={{fontSize:9,color:C.oliva,textTransform:"uppercase",fontWeight:600,marginBottom:1}}>Status</div><Badge label={detail.status}/></div>
              <div><div style={{fontSize:9,color:C.oliva,textTransform:"uppercase",fontWeight:600,marginBottom:1}}>Total / Pago / Saldo</div><div style={{fontSize:13,fontWeight:700}}>{fmtBRL(detail.precoFinal||detail.price)} / {fmtBRL(detail.valorPago||0)} / <span style={{color:C.vermelho}}>{fmtBRL(Math.max(0,(detail.precoFinal||detail.price)-(detail.valorPago||0)))}</span></div></div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <Btn v="oliva" onClick={()=>sendWA(detail)}>💬 WhatsApp</Btn>
            <Btn v="ghost" onClick={()=>{setDetail(null);openEdit(detail);}}>✎ Editar</Btn>
            {onFicha&&<Btn v="gold" onClick={()=>{setDetail(null);onFicha(detail);}}>📋 Ficha</Btn>}
          </div>
        </Modal>
      )}

      {modal&&<OrderForm form={form} setForm={setForm} products={products} config={config} clients={clients} onClose={()=>setModal(null)} onSave={save}/>}
    </div>
  );
};

const BaixaForm = ({order,contas,onConfirm}) => {
  const pF=order.precoFinal||order.price||0;
  const saldoAb=Math.max(0,pF-(order.valorPago||0));
  const [valor,setValor]=useState(saldoAb);
  const [data,setData]=useState(today);
  const [contaId,setContaId]=useState(contas[0]?.id||"");
  return (
    <div>
      <div style={{background:C.linho,borderRadius:6,padding:"12px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{color:C.oliva}}>Total</span><span style={{fontWeight:700}}>{fmtBRL(pF)}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{color:C.oliva}}>Já pago</span><span>{fmtBRL(order.valorPago||0)}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13,paddingTop:6,borderTop:`1px dashed ${C.areia}`}}><span style={{fontWeight:700}}>Saldo em aberto</span><span style={{fontWeight:700,color:C.vermelho}}>{fmtBRL(saldoAb)}</span></div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <Inp label="Valor pago agora (R$)" type="number" value={valor} onChange={setValor}/>
        <Inp label="Data do pagamento" type="date" value={data} onChange={setData}/>
        <Sel label="Conta que recebeu" value={contaId} onChange={setContaId} options={contas.map(c=>({v:c.id,l:c.nome}))}/>
      </div>
      <div style={{background:C.linho,borderRadius:4,padding:"10px",marginTop:10,textAlign:"center"}}>
        <span style={{fontSize:12,color:C.oliva}}>Saldo restante: </span>
        <span style={{fontSize:15,fontWeight:700,fontFamily:"'Playfair Display',serif",color:Math.max(0,saldoAb-Number(valor))<=0?C.oliva:C.vermelho}}>{fmtBRL(Math.max(0,saldoAb-Number(valor)))}</span>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:14}}>
        <Btn onClick={()=>onConfirm(order,valor,data,contaId)}>Confirmar pagamento</Btn>
      </div>
    </div>
  );
};

const OrderForm = ({form,setForm,products,config,clients,onClose,onSave}) => {
  const selProd=products.find(p=>p.name===form.product);
  const pcd=()=>{const p=Number(form.price||0),d=Number(form.desconto||0);return form.tipoDesc==="pct"?p*(1-d/100):Math.max(0,p-d);};
  return (
    <Modal title="Encomenda" onClose={onClose} wide>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div style={{gridColumn:"1/-1"}}>
          <ClienteSearch value={form.client} onChange={v=>setForm(f=>({...f,client:v}))} onPhoneChange={v=>setForm(f=>({...f,phone:v}))} clients={clients}/>
        </div>
        <Inp label="WhatsApp" value={form.phone} onChange={v=>setForm(f=>({...f,phone:v}))}/>
        <Sel label="Como chegou até você" value={form.origem} onChange={v=>setForm(f=>({...f,origem:v}))} options={ORIGENS}/>
        <div>
          <label style={{fontSize:11,fontWeight:600,letterSpacing:"0.8px",color:C.oliva,textTransform:"uppercase",display:"block",marginBottom:4}}>Produto</label>
          <select value={form.product} onChange={e=>{const p=products.find(x=>x.name===e.target.value);setForm(f=>({...f,product:e.target.value,price:p?.price||f.price,color:"",size:""}));}} style={{width:"100%",padding:"9px 13px",border:`1.5px solid ${C.areia}`,borderRadius:3,fontSize:13,color:C.cafe,background:C.branco}}>
            <option value="">Selecionar...</option>
            {products.map(p=><option key={p.id}>{p.name}</option>)}
          </select>
        </div>
        {selProd?.cores?.length>0?<Sel label="Cor" value={form.color} onChange={v=>setForm(f=>({...f,color:v}))} options={["—",...selProd.cores.map(c=>c.nome)]}/>:<Inp label="Cor" value={form.color} onChange={v=>setForm(f=>({...f,color:v}))}/>}
        {selProd?.tamanhos?.length>0
          ?<Sel label="Tamanho" value={form.size} onChange={v=>{const vt=selProd.valorPorTamanho?.find(x=>x.tamanho===v);setForm(f=>({...f,size:v,price:vt?.preco||f.price}));}} options={["—",...selProd.tamanhos]}/>
          :<Inp label="Tamanho" value={form.size} onChange={v=>setForm(f=>({...f,size:v}))}/>}
        <div style={{gridColumn:"1/-1"}}><Inp label="Medidas" value={form.measures} onChange={v=>setForm(f=>({...f,measures:v}))} placeholder="Ex: Busto 90cm / Comprimento 60cm"/></div>
        <Inp label="Valor (R$)" type="number" value={form.price} onChange={v=>setForm(f=>({...f,price:v}))}/>
        <div>
          <label style={{fontSize:11,fontWeight:600,letterSpacing:"0.8px",color:C.oliva,textTransform:"uppercase",display:"block",marginBottom:4}}>Desconto</label>
          <div style={{display:"flex",gap:6}}>
            <input type="number" value={form.desconto||0} onChange={e=>setForm(f=>({...f,desconto:e.target.value}))} style={{flex:1,padding:"9px 10px",border:`1.5px solid ${C.areia}`,borderRadius:3,fontSize:13,color:C.cafe}}/>
            <button onClick={()=>setForm(f=>({...f,tipoDesc:f.tipoDesc==="pct"?"valor":"pct"}))} style={{padding:"0 12px",border:`1.5px solid ${C.areia}`,borderRadius:3,background:C.linho,fontSize:13,fontWeight:700,color:C.cafe}}>{form.tipoDesc==="pct"?"%":"R$"}</button>
          </div>
          {Number(form.desconto)>0&&<div style={{fontSize:11,color:C.dourado,marginTop:2}}>Final: <b>{fmtBRL(pcd())}</b></div>}
        </div>
        <Inp label="Data da compra" type="date" value={form.dataCompra} onChange={v=>setForm(f=>({...f,dataCompra:v}))}/>
        <Inp label="Previsão de entrega" type="date" value={form.delivery} onChange={v=>setForm(f=>({...f,delivery:v}))}/>
        <Inp label="Posição na fila" type="number" value={form.position} onChange={v=>setForm(f=>({...f,position:v}))}/>
        <Sel label="Forma de pagamento" value={form.payment} onChange={v=>setForm(f=>({...f,payment:v}))} options={config.pagamentos||["PIX","Mercado Pago","Cartão"]}/>
        <Inp label="Código de rastreio" value={form.tracking||""} onChange={v=>setForm(f=>({...f,tracking:v}))}/>
        <div style={{gridColumn:"1/-1"}}>
          <label style={{fontSize:11,fontWeight:600,letterSpacing:"0.8px",color:C.oliva,textTransform:"uppercase",display:"block",marginBottom:6}}>Condição de pagamento</label>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {["À vista","Com entrada","Parcelado"].map(c=><button key={c} onClick={()=>setForm(f=>({...f,condicao:c,parcelas:[]}))} style={{flex:1,padding:"8px",borderRadius:4,border:`2px solid ${form.condicao===c?C.cafe:C.areia}`,background:form.condicao===c?C.cafe:"transparent",color:form.condicao===c?"#fff":C.cafe,fontSize:12,fontWeight:700,cursor:"pointer",minWidth:80}}>{c==="À vista"?"💰 À vista":c==="Com entrada"?"🤝 Com entrada":"📅 Parcelado"}</button>)}
          </div>
        </div>
        {form.condicao==="Com entrada"&&<div style={{gridColumn:"1/-1",background:C.linho,borderRadius:6,padding:"12px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Inp label="Valor da entrada (R$)" type="number" value={form.entrada||0} onChange={v=>setForm(f=>({...f,entrada:Number(v)}))}/>
          <Inp label="Data da entrada" type="date" value={form.dataEntradaPag||today} onChange={v=>setForm(f=>({...f,dataEntradaPag:v}))}/>
          <Inp label="Data limite para o saldo" type="date" value={form.dataSaldo||form.delivery||""} onChange={v=>setForm(f=>({...f,dataSaldo:v}))}/>
          <div style={{display:"flex",alignItems:"center",background:"#FEF3E9",borderRadius:4,padding:"8px 10px",fontSize:11,color:"#9A6B40",gap:4}}>⚠ Saldo: <b>{fmtBRL(Math.max(0,pcd()-Number(form.entrada||0)))}</b> até 1 dia antes do envio</div>
        </div>}
        {form.condicao==="Parcelado"&&<div style={{gridColumn:"1/-1"}}>
          <div style={{display:"flex",gap:10,marginBottom:10,flexWrap:"wrap",alignItems:"flex-end"}}>
            <div style={{flex:1,minWidth:120}}><Inp label="Nº de parcelas" type="number" value={form.qtdParcelas||2} onChange={v=>setForm(f=>({...f,qtdParcelas:Number(v),parcelas:[]}))}/></div>
            <Btn sm v="ghost" onClick={()=>setForm(f=>({...f,parcelas:calcParcs(f.dataCompra||today,Number(f.qtdParcelas)||2,pcd())}))}>↻ Gerar automaticamente</Btn>
          </div>
          {form.parcelas?.length>0&&<div style={{display:"flex",flexDirection:"column",gap:5}}>
            {form.parcelas.map((p,i)=><div key={i} style={{display:"flex",gap:8,alignItems:"center",background:C.linho,borderRadius:4,padding:"6px 10px"}}>
              <span style={{fontSize:12,fontWeight:700,width:45}}>{p.n}ª</span>
              <input type="date" value={p.data} onChange={e=>setForm(f=>{const n=[...f.parcelas];n[i]={...n[i],data:e.target.value};return{...f,parcelas:n};})} style={{flex:1,padding:"5px 8px",border:`1px solid ${C.areia}`,borderRadius:3,fontSize:12}}/>
              <input type="number" value={p.valor} onChange={e=>setForm(f=>{const n=[...f.parcelas];n[i]={...n[i],valor:Number(e.target.value)};return{...f,parcelas:n};})} style={{width:85,padding:"5px 8px",border:`1px solid ${C.areia}`,borderRadius:3,fontSize:12}}/>
            </div>)}
          </div>}
        </div>}
        <div style={{gridColumn:"1/-1"}}><Sel label="Status" value={form.status} onChange={v=>setForm(f=>({...f,status:v}))} options={Object.keys(STATUS).filter(s=>s!=="Cancelado")}/></div>
        <div style={{gridColumn:"1/-1"}}><Inp label="Observações" value={form.note} onChange={v=>setForm(f=>({...f,note:v}))} rows={2}/></div>
      </div>
      <div style={{display:"flex",gap:10,marginTop:16,justifyContent:"flex-end"}}>
        <Btn v="ghost" onClick={onClose}>Cancelar</Btn>
        <Btn onClick={onSave}>Salvar</Btn>
      </div>
    </Modal>
  );
};

// ─── PRODUÇÃO ─────────────────────────────────────────────────────────────────
const Production = ({orders,products}) => {
  const active=orders.filter(o=>!["Concluído","Enviado","Cancelado"].includes(o.status)).sort((a,b)=>(a.position||999)-(b.position||999));
  const totalH=active.reduce((a,o)=>{const p=products.find(x=>x.name===o.product);return a+(p?.hours||0);},0);
  return (
    <div className="fade" style={{padding:24}}>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:18}}>
        {[{l:"Horas na fila",v:`${totalH}h`,c:C.dourado},{l:"Horas/semana",v:`${TOTAL_WH}h`,c:C.cafe},{l:"Semanas necessárias",v:Math.ceil(totalH/TOTAL_WH)||0,c:C.oliva}].map(k=>(
          <Card key={k.l} style={{flex:"1 1 130px",textAlign:"center"}}><div style={{fontSize:26,fontFamily:"'Playfair Display',serif",color:k.c}}>{k.v}</div><div style={{fontSize:10,color:C.oliva,letterSpacing:"1px",textTransform:"uppercase",marginTop:2}}>{k.l}</div></Card>
        ))}
      </div>
      <h3 style={{fontSize:15,marginBottom:12}}>Fila de produção</h3>
      {active.length===0&&<div style={{textAlign:"center",padding:"30px",color:C.oliva,fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:15}}>Nenhum pedido em produção ✦</div>}
      {active.map((o,idx)=>{
        const p=products.find(x=>x.name===o.product);
        const hrs=p?.hours||0,dias=calcDays(hrs),buf=p?.buffer||0;
        const pct=o.status==="Pedido recebido"?5:o.status==="Materiais separados"?15:o.status==="Em produção"?55:o.status==="Finalização"?85:o.status==="Pronto para envio"?100:0;
        return (
          <Card key={o.id} style={{marginBottom:10}}>
            <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:C.cafe,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>{idx+1}</div>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{o.product}</div><div style={{fontSize:11,color:C.oliva}}>{o.client}{o.color?` · ${o.color}`:""}{ o.size?` · ${o.size}`:""}</div></div>
              {[{l:"Horas",v:`${hrs}h`},{l:"Dias prod.",v:`${dias}d`},{l:"Buffer",v:`+${buf}d`},{l:"Total",v:`${dias+buf}d`,h:true}].map(x=><div key={x.l} style={{textAlign:"center"}}><div style={{fontSize:10,color:C.oliva}}>{x.l}</div><div style={{fontSize:14,fontWeight:700,color:x.h?C.dourado:C.cafe}}>{x.v}</div></div>)}
              <Badge label={o.status}/>
            </div>
            <div style={{marginTop:8}}><PBar pct={pct}/></div>
          </Card>
        );
      })}
    </div>
  );
};

// ─── ESTOQUE ──────────────────────────────────────────────────────────────────
const StockSup = ({stockSup,setStockSup}) => {
  const [search,setSearch]=useState("");
  const [modal,setModal]=useState(null);
  const [moveModal,setMoveModal]=useState(null);
  const [histModal,setHistModal]=useState(null);
  const [moveQty,setMoveQty]=useState(1);
  const [moveNota,setMoveNota]=useState("");
  const EF={nome:"",tipo:"Linha/Fio",unidade:"un",qty:0,min:0,custoUnitario:0,fornecedor:"",foto:"",historico:[]};
  const [form,setForm]=useState(EF);
  const fileRef=useRef();
  const filtered=stockSup.filter(s=>s.nome.toLowerCase().includes(search.toLowerCase()));
  const low=stockSup.filter(s=>Number(s.qty)<=Number(s.min));

  const save=()=>{
    const s={...form,qty:Number(form.qty),min:Number(form.min),custoUnitario:Number(form.custoUnitario)};
    if(modal==="new")setStockSup(prev=>[...prev,{...s,id:uid(),historico:[{data:today,op:"entrada",qtd:s.qty,nota:"Cadastro inicial"}]}]);
    else setStockSup(prev=>prev.map(x=>x.id===s.id?{...x,...s}:x));
    setModal(null);
  };

  const move=(item,op)=>{
    const diff=op==="add"?Number(moveQty):-Number(moveQty);
    const newQty=Math.max(0,item.qty+diff);
    setStockSup(prev=>prev.map(x=>x.id===item.id?{...x,qty:newQty,historico:[{data:today,op:op==="add"?"entrada":"saída",qtd:Number(moveQty),nota:moveNota},...(x.historico||[])]}:x));
    setMoveModal(null);setMoveQty(1);setMoveNota("");
  };

  return (
    <div>
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{flex:1,minWidth:160}}><Inp value={search} onChange={setSearch} placeholder="Buscar material..."/></div>
        <Btn onClick={()=>{setForm(EF);setModal("new");}}>+ Novo Material</Btn>
      </div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}}>
        {[{l:"Itens",v:stockSup.length},{l:"Valor em estoque",v:fmtBRL(stockSup.reduce((a,s)=>a+Number(s.qty||0)*Number(s.custoUnitario||0),0))},{l:"Abaixo do mínimo",v:low.length}].map(k=><Card key={k.l} style={{flex:"1 1 120px",textAlign:"center"}}><div style={{fontSize:20,fontFamily:"'Playfair Display',serif",color:C.dourado}}>{k.v}</div><div style={{fontSize:10,color:C.oliva,letterSpacing:"1px",marginTop:2,textTransform:"uppercase"}}>{k.l}</div></Card>)}
      </div>
      {filtered.length===0&&<div style={{textAlign:"center",padding:"30px",color:C.oliva,fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:14}}>Nenhum material cadastrado ainda ✦</div>}
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
        {filtered.map(s=>(
          <div key={s.id} className="ch" style={{flex:"1 1 180px",minWidth:170,background:C.branco,border:`1px solid ${Number(s.qty)<=Number(s.min)?C.dourado:C.areia}`,borderRadius:8,overflow:"hidden",position:"relative"}}>
            {Number(s.qty)<=Number(s.min)&&<div style={{position:"absolute",top:6,right:6,background:C.vermelho,color:"#fff",fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:10,zIndex:1}}>Baixo</div>}
            <div style={{height:80,background:s.foto?undefined:`linear-gradient(135deg,${C.areia},${C.dourado})`,backgroundImage:s.foto?`url(${s.foto})`:"none",backgroundSize:"cover",backgroundPosition:"center",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>{!s.foto&&"🧶"}</div>
            <div style={{padding:"10px 12px"}}>
              <div style={{fontSize:13,fontWeight:700}}>{s.nome}</div>
              <div style={{fontSize:10,color:C.oliva,marginBottom:5}}>{s.tipo}</div>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontSize:13,fontWeight:700}}>{s.qty} {s.unidade}</span>
                <span style={{fontSize:11,color:C.dourado}}>{fmtBRL(s.custoUnitario)}/{s.unidade}</span>
              </div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                <Btn sm v="oliva" onClick={()=>setMoveModal({item:s,op:"add"})}>➕</Btn>
                <Btn sm v="danger" onClick={()=>setMoveModal({item:s,op:"sub"})}>➖</Btn>
                <Btn sm v="ghost" onClick={()=>{setForm({...EF,...s,historico:s.historico||[]});setModal("edit");}}>✎</Btn>
                <Btn sm v="ghost" onClick={()=>setHistModal(s)}>📋</Btn>
                <Btn sm v="danger" onClick={()=>{if(window.confirm(`Excluir "${s.nome}"?`))setStockSup(prev=>prev.filter(x=>x.id!==s.id));}}>✕</Btn>
              </div>
            </div>
          </div>
        ))}
      </div>

      {moveModal&&<Modal title={moveModal.op==="add"?"Adicionar quantidade":"Registrar saída"} onClose={()=>setMoveModal(null)}>
        <div style={{textAlign:"center",marginBottom:14}}>
          <div style={{fontSize:15,fontWeight:700}}>{moveModal.item.nome}</div>
          <div style={{fontSize:26,fontFamily:"'Playfair Display',serif",color:C.dourado,marginTop:4}}>{moveModal.item.qty} {moveModal.item.unidade}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <Inp label={`Quantidade (${moveModal.item.unidade})`} type="number" value={moveQty} onChange={setMoveQty}/>
          <Inp label="Observação" value={moveNota} onChange={setMoveNota} placeholder="Ex: compra, uso em pedido..."/>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:14}}>
          <Btn v={moveModal.op==="add"?"primary":"danger"} onClick={()=>move(moveModal.item,moveModal.op)}>Confirmar</Btn>
        </div>
      </Modal>}

      {histModal&&<Modal title={`Histórico — ${histModal.nome}`} onClose={()=>setHistModal(null)}>
        {!(histModal.historico?.length)&&<div style={{fontSize:13,color:C.oliva,fontStyle:"italic",textAlign:"center"}}>Sem movimentações.</div>}
        {(histModal.historico||[]).map((h,i)=><div key={i} style={{display:"flex",gap:10,padding:"7px 0",borderBottom:`1px solid ${C.linho}`}}>
          <div style={{width:26,height:26,borderRadius:"50%",background:h.op==="entrada"?"#D4E8D4":"#FEE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,flexShrink:0}}>{h.op==="entrada"?"➕":"➖"}</div>
          <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:h.op==="entrada"?C.oliva:C.vermelho}}>{h.op==="entrada"?"+":"-"}{h.qtd} {histModal.unidade}</div>{h.nota&&<div style={{fontSize:11,color:C.oliva}}>{h.nota}</div>}</div>
          <div style={{fontSize:11,color:C.oliva,flexShrink:0}}>{fmtDate(h.data)}</div>
        </div>)}
      </Modal>}

      {modal&&<Modal title={modal==="new"?"Novo Material":"Editar Material"} onClose={()=>setModal(null)}>
        <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:12}}>
          <div style={{width:56,height:56,borderRadius:6,background:form.foto?undefined:`linear-gradient(135deg,${C.areia},${C.dourado})`,backgroundImage:form.foto?`url(${form.foto})`:"none",backgroundSize:"cover",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,cursor:"pointer",border:`2px dashed ${C.areia}`}} onClick={()=>fileRef.current.click()}>{!form.foto&&"📷"}</div>
          <Btn sm v="ghost" onClick={()=>fileRef.current.click()}>📷 Foto do fio/material</Btn>
          <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={async e=>{if(e.target.files[0]){const u=await readFile(e.target.files[0]);setForm(f=>({...f,foto:u}));}}}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{gridColumn:"1/-1"}}><Inp label="Nome" value={form.nome} onChange={v=>setForm(f=>({...f,nome:v}))}/></div>
          <Sel label="Tipo" value={form.tipo} onChange={v=>setForm(f=>({...f,tipo:v}))} options={TIPOS_SUP}/>
          <Sel label="Unidade" value={form.unidade} onChange={v=>setForm(f=>({...f,unidade:v}))} options={UNIDADES}/>
          <Inp label="Quantidade atual" type="number" value={form.qty} onChange={v=>setForm(f=>({...f,qty:v}))}/>
          <Inp label="Estoque mínimo" type="number" value={form.min} onChange={v=>setForm(f=>({...f,min:v}))}/>
          <Inp label="Custo unitário (R$)" type="number" value={form.custoUnitario} onChange={v=>setForm(f=>({...f,custoUnitario:v}))}/>
          <Inp label="Fornecedor" value={form.fornecedor} onChange={v=>setForm(f=>({...f,fornecedor:v}))}/>
        </div>
        <div style={{display:"flex",gap:10,marginTop:14,justifyContent:"flex-end"}}><Btn v="ghost" onClick={()=>setModal(null)}>Cancelar</Btn><Btn onClick={save}>Salvar</Btn></div>
      </Modal>}
    </div>
  );
};

            </div>
          </Card>
        ))}
      </div>
    </div>
  );

// ─── FINANCEIRO ───────────────────────────────────────────────────────────────
const Finance = ({finance,setFinance,orders,contas,setContas}) => {
  const [tab,setTab]=useState("lanc");
  const [formModal,setFormModal]=useState(false);
  const [contaModal,setContaModal]=useState(false);
  const [transModal,setTransModal]=useState(false);
  const [per,setPer]=useState("mes");
  const [mes,setMes]=useState(today.slice(0,7));
  const [ano,setAno]=useState(today.slice(0,4));
  const [form,setForm]=useState({type:"receita",desc:"",value:0,date:today,dataVencimento:today,category:"Moda",centrocusto:"Vendas",pago:true,fixa:false,contaId:"",clientName:"",orderId:""});
  const [cForm,setCForm]=useState({nome:"",tipo:"Conta corrente",saldo:0,cor:"#B08D57"});
  const [tForm,setTForm]=useState({de:"",para:"",valor:0,data:today,nota:""});
  const MESES=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

  const inPer=f=>{if(per==="dia")return f.date===today;if(per==="mes")return f.date?.startsWith(mes);if(per==="ano")return f.date?.startsWith(ano);return true;};
  const filt=finance.filter(inPer);
  const rec=filt.filter(f=>f.type==="receita").reduce((a,f)=>a+f.value,0);
  const desp=filt.filter(f=>f.type==="despesa").reduce((a,f)=>a+f.value,0);
  const aRec=orders.filter(o=>o.status!=="Cancelado").reduce((a,o)=>a+Math.max(0,(o.precoFinal||o.price||0)-(o.valorPago||0)),0);
  const aPag=finance.filter(f=>f.type==="despesa"&&!f.pago).reduce((a,f)=>a+f.value,0);
  const recHoje=finance.filter(f=>f.type==="receita"&&f.date===today).reduce((a,f)=>a+f.value,0);
  const balAno=Array.from({length:12},(_,i)=>{const m=`${ano}-${String(i+1).padStart(2,"0")}`;const r=finance.filter(f=>f.type==="receita"&&f.date?.startsWith(m)).reduce((a,f)=>a+f.value,0);const d=finance.filter(f=>f.type==="despesa"&&f.date?.startsWith(m)).reduce((a,f)=>a+f.value,0);return{mes:m,label:MESES[i],r,d,lucro:r-d};});

  const saveForm=()=>{
    const e={...form,id:uid(),value:Number(form.value)};
    setFinance(prev=>[...prev,e]);
    if(e.contaId){const delta=e.type==="receita"?e.value:-e.value;setContas(prev=>prev.map(c=>c.id===e.contaId?{...c,saldo:(c.saldo||0)+delta}:c));}
    setFormModal(false);
  };
  const saveConta=()=>{if(cForm.id)setContas(prev=>prev.map(c=>c.id===cForm.id?{...cForm,saldo:Number(cForm.saldo)}:c));else setContas(prev=>[...prev,{...cForm,id:uid(),saldo:Number(cForm.saldo)}]);setContaModal(false);};
  const doTrans=()=>{const v=Number(tForm.valor);setContas(prev=>prev.map(c=>c.id===tForm.de?{...c,saldo:(c.saldo||0)-v}:c.id===tForm.para?{...c,saldo:(c.saldo||0)+v}:c));const de=contas.find(c=>c.id===tForm.de);const para=contas.find(c=>c.id===tForm.para);setFinance(prev=>[...prev,{id:uid(),type:"despesa",desc:`Transferência → ${para?.nome}`,value:v,date:tForm.data,category:"Outros",centrocusto:"Despesas",pago:true,contaId:tForm.de},{id:uid(),type:"receita",desc:`Transferência ← ${de?.nome}`,value:v,date:tForm.data,category:"Outros",centrocusto:"Investimentos",pago:true,contaId:tForm.para}]);setTransModal(false);};

  return (
    <div className="fade" style={{padding:24}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
        <Tabs tabs={[{k:"lanc",l:"Lançamentos"},{k:"rec",l:"A Receber"},{k:"pag",l:"A Pagar"},{k:"bal",l:"Balanço"},{k:"cx",l:"Fluxo de Caixa"},{k:"div",l:"Divisão do Dia"}]} active={tab} set={setTab}/>
        <div style={{marginLeft:"auto",display:"flex",gap:8}}>
          <Btn sm v="ghost" onClick={()=>{setCForm({nome:"",tipo:"Conta corrente",saldo:0,cor:"#B08D57"});setContaModal(true);}}>+ Conta</Btn>
          <Btn onClick={()=>setFormModal(true)}>+ Lançamento</Btn>
        </div>
      </div>

      {contas.length>0&&<div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:16}}>
        {contas.map(c=><div key={c.id} className="ch" onClick={()=>{setCForm({...c});setContaModal(true);}} style={{flex:"1 1 130px",background:`linear-gradient(135deg,${c.cor||C.dourado},${c.cor||C.dourado}bb)`,borderRadius:8,padding:"12px 16px",cursor:"pointer"}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.8)",letterSpacing:"1px",textTransform:"uppercase",marginBottom:3}}>{c.tipo}</div>
          <div style={{fontSize:13,fontWeight:700,color:"#fff",marginBottom:3}}>{c.nome}</div>
          <div style={{fontSize:20,fontFamily:"'Playfair Display',serif",color:"#fff",fontWeight:700}}>{fmtBRL(c.saldo||0)}</div>
        </div>)}
        <div onClick={()=>{setCForm({nome:"",tipo:"Conta corrente",saldo:0,cor:"#B08D57"});setContaModal(true);}} style={{flex:"1 1 90px",border:`2px dashed ${C.areia}`,borderRadius:8,padding:"12px",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:12,color:C.oliva,fontWeight:600}}>+ Nova conta</div>
        <div onClick={()=>{setTForm({de:contas[0]?.id||"",para:contas[1]?.id||"",valor:0,data:today,nota:""});setTransModal(true);}} style={{flex:"1 1 90px",border:`2px dashed ${C.dourado}`,borderRadius:8,padding:"12px",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:12,color:C.dourado,fontWeight:600}}>⇄ Transferir</div>
      </div>}

      {tab==="lanc"&&<>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12,alignItems:"center"}}>
          {[{k:"dia",l:"Hoje"},{k:"mes",l:"Mês"},{k:"ano",l:"Ano"},{k:"todos",l:"Todos"}].map(p=><button key={p.k} onClick={()=>setPer(p.k)} style={{padding:"4px 12px",borderRadius:20,border:`1.5px solid ${per===p.k?C.cafe:C.areia}`,background:per===p.k?C.cafe:"transparent",color:per===p.k?"#fff":C.cafe,fontSize:11,fontWeight:600,cursor:"pointer"}}>{p.l}</button>)}
          {per==="mes"&&<input type="month" value={mes} onChange={e=>setMes(e.target.value)} style={{padding:"5px 10px",border:`1.5px solid ${C.areia}`,borderRadius:3,fontSize:12,color:C.cafe}}/>}
          {per==="ano"&&<input type="number" value={ano} onChange={e=>setAno(e.target.value)} style={{padding:"5px 10px",border:`1.5px solid ${C.areia}`,borderRadius:3,fontSize:12,color:C.cafe,width:80}}/>}
        </div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}}>
          {[{l:"Receitas",v:fmtBRL(rec),c:C.oliva},{l:"Despesas",v:fmtBRL(desp),c:C.vermelho},{l:"Lucro",v:fmtBRL(rec-desp),c:rec-desp>=0?C.dourado:C.vermelho},{l:"Margem",v:`${rec>0?Math.round(((rec-desp)/rec)*100):0}%`,c:C.cafe}].map(k=><Card key={k.l} style={{flex:"1 1 100px"}}><div style={{fontSize:9,letterSpacing:"1.5px",textTransform:"uppercase",color:C.oliva,marginBottom:3,fontWeight:700}}>{k.l}</div><div style={{fontSize:20,fontFamily:"'Playfair Display',serif",color:k.c}}>{k.v}</div></Card>)}
        </div>
        {filt.length===0?<div style={{textAlign:"center",padding:"30px",color:C.oliva,fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:14}}>Nenhum lançamento nesse período ✦</div>:(
        <Card style={{padding:0,overflow:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:500}}>
            <thead><tr style={{background:C.linho}}>{["Data","Tipo","Descrição","Centro","Valor","Vencimento","Status",""].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"left",fontSize:10,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",color:C.oliva,borderBottom:`1px solid ${C.areia}`,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
            <tbody>
              {[...filt].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(f=>(
                <tr key={f.id} style={{borderBottom:`1px solid ${C.linho}`}}>
                  <td style={{padding:"8px 10px",fontSize:12,color:C.oliva,whiteSpace:"nowrap"}}>{fmtDate(f.date)}</td>
                  <td style={{padding:"8px 10px"}}><span style={{fontSize:10,padding:"2px 7px",borderRadius:10,fontWeight:700,background:f.type==="receita"?"#D4E8D4":"#FEE",color:f.type==="receita"?"#2E6B2E":C.vermelho}}>{f.type==="receita"?"RECEITA":"DESPESA"}</span></td>
                  <td style={{padding:"8px 10px"}}><div style={{fontSize:12,fontWeight:600}}>{f.desc}{f.fixa&&<span style={{fontSize:9,background:C.d20,color:C.dourado,padding:"1px 5px",borderRadius:10,fontWeight:700,marginLeft:4}}>FIXA</span>}</div>{f.clientName&&<div style={{fontSize:10,color:C.oliva}}>{f.clientName}{f.orderId?` · ${f.orderId}`:""}</div>}</td>
                  <td style={{padding:"8px 10px",fontSize:11,color:C.oliva}}>{f.centrocusto}</td>
                  <td style={{padding:"8px 10px",fontSize:13,fontWeight:700,color:f.type==="receita"?C.oliva:C.vermelho}}>{f.type==="receita"?"+":"-"}{fmtBRL(f.value)}</td>
                  <td style={{padding:"8px 10px",fontSize:11,color:C.oliva,whiteSpace:"nowrap"}}>{fmtDate(f.dataVencimento)}</td>
                  <td style={{padding:"8px 10px"}}>{f.type==="despesa"&&<button onClick={()=>{setFinance(prev=>prev.map(x=>x.id===f.id?{...x,pago:!x.pago}:x));if(!f.pago&&f.contaId)setContas(prev=>prev.map(c=>c.id===f.contaId?{...c,saldo:(c.saldo||0)-f.value}:c));}} style={{fontSize:10,padding:"2px 8px",borderRadius:10,fontWeight:700,border:"none",cursor:"pointer",background:f.pago?"#D4E8D4":"#FEF3E9",color:f.pago?"#2E6B2E":"#9A6B40"}}>{f.pago?"✓ Pago":"Pendente"}</button>}</td>
                  <td style={{padding:"8px 10px"}}><Btn sm v="danger" onClick={()=>setFinance(prev=>prev.filter(x=>x.id!==f.id))}>✕</Btn></td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>)}
      </>}

      {tab==="rec"&&<div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}}>
          {[{l:"A receber",v:fmtBRL(aRec),c:C.dourado},{l:"Total recebido",v:fmtBRL(orders.reduce((a,o)=>a+(o.valorPago||0),0)),c:C.oliva}].map(k=><Card key={k.l} style={{flex:"1 1 140px"}}><div style={{fontSize:9,letterSpacing:"1.5px",textTransform:"uppercase",color:C.oliva,marginBottom:4,fontWeight:700}}>{k.l}</div><div style={{fontSize:22,fontFamily:"'Playfair Display',serif",color:k.c}}>{k.v}</div></Card>)}
        </div>
        {orders.filter(o=>Math.max(0,(o.precoFinal||o.price||0)-(o.valorPago||0))>0&&o.status!=="Cancelado").length===0?<div style={{fontSize:13,color:C.oliva,fontStyle:"italic"}}>Todos os pedidos estão pagos ✓</div>:null}
        {orders.filter(o=>Math.max(0,(o.precoFinal||o.price||0)-(o.valorPago||0))>0&&o.status!=="Cancelado").map(o=>{
          const pF=o.precoFinal||o.price||0;
          const saldo=Math.max(0,pF-(o.valorPago||0));
          return(<Card key={o.id} style={{marginBottom:10,padding:"12px 16px"}}>
            <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{o.client} <span style={{fontSize:11,color:C.dourado,fontWeight:400}}>· {o.id}</span></div><div style={{fontSize:11,color:C.oliva}}>{o.product} · {o.condicao||"À vista"} · Entrega: {fmtDate(o.delivery)}</div><div style={{display:"flex",gap:10,marginTop:3,fontSize:11}}><span>Total: <b>{fmtBRL(pF)}</b></span><span style={{color:C.oliva}}>Pago: <b>{fmtBRL(o.valorPago||0)}</b></span><span style={{color:C.vermelho}}>Saldo: <b>{fmtBRL(saldo)}</b></span></div></div>
              <Badge label={o.status}/>
            </div>
          </Card>);
        })}
      </div>}

      {tab==="pag"&&<div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}}>
          <Card style={{flex:"1 1 140px"}}><div style={{fontSize:9,letterSpacing:"1.5px",textTransform:"uppercase",color:C.oliva,marginBottom:4,fontWeight:700}}>A pagar</div><div style={{fontSize:22,fontFamily:"'Playfair Display',serif",color:C.vermelho}}>{fmtBRL(aPag)}</div></Card>
        </div>
        {finance.filter(f=>f.type==="despesa"&&!f.pago).length===0?<div style={{fontSize:13,color:C.oliva,fontStyle:"italic"}}>Nenhuma despesa pendente ✓</div>:null}
        {finance.filter(f=>f.type==="despesa"&&!f.pago).map(f=>(
          <Card key={f.id} style={{marginBottom:10,padding:"12px 16px"}}>
            <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{f.desc}{f.fixa&&<span style={{fontSize:9,background:C.d20,color:C.dourado,padding:"1px 5px",borderRadius:10,fontWeight:700,marginLeft:4}}>FIXA</span>}</div><div style={{fontSize:11,color:C.oliva}}>{f.centrocusto} · Venc: {fmtDate(f.dataVencimento)}</div></div>
              <div style={{fontSize:17,fontFamily:"'Playfair Display',serif",color:C.vermelho,fontWeight:700}}>{fmtBRL(f.value)}</div>
              <Btn sm onClick={()=>{setFinance(prev=>prev.map(x=>x.id===f.id?{...x,pago:true}:x));if(f.contaId)setContas(prev=>prev.map(c=>c.id===f.contaId?{...c,saldo:(c.saldo||0)-f.value}:c));}}>✓ Pago</Btn>
            </div>
          </Card>
        ))}
      </div>}

      {tab==="bal"&&<div>
        <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}><label style={{fontSize:12,color:C.oliva}}>Ano:</label><input type="number" value={ano} onChange={e=>setAno(e.target.value)} style={{padding:"6px 10px",border:`1.5px solid ${C.areia}`,borderRadius:3,fontSize:13,color:C.cafe,width:85}}/></div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}}>
          {[{l:"Receita anual",v:fmtBRL(balAno.reduce((a,m)=>a+m.r,0)),c:C.oliva},{l:"Despesa anual",v:fmtBRL(balAno.reduce((a,m)=>a+m.d,0)),c:C.vermelho},{l:"Lucro anual",v:fmtBRL(balAno.reduce((a,m)=>a+m.lucro,0)),c:C.dourado},{l:"Investimentos",v:fmtBRL(finance.filter(f=>f.centrocusto==="Investimentos"&&f.date?.startsWith(ano)).reduce((a,f)=>a+f.value,0)),c:C.oliva}].map(k=><Card key={k.l} style={{flex:"1 1 120px"}}><div style={{fontSize:9,letterSpacing:"1.5px",textTransform:"uppercase",color:C.oliva,marginBottom:3,fontWeight:700}}>{k.l}</div><div style={{fontSize:18,fontFamily:"'Playfair Display',serif",color:k.c}}>{k.v}</div></Card>)}
        </div>
        <Card style={{padding:0,overflow:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:C.linho}}>{["Mês","Receitas","Despesas","Lucro","Margem"].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"left",fontSize:10,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",color:C.oliva,borderBottom:`1px solid ${C.areia}`}}>{h}</th>)}</tr></thead>

              <td style={{padding:"8px 10px",fontSize:12,color:C.oliva}}>{m.r>0?fmtBRL(m.r):"—"}</td>
              <td style={{padding:"8px 10px",fontSize:12,color:m.d>0?C.vermelho:C.oliva}}>{m.d>0?fmtBRL(m.d):"—"}</td>
              <td style={{padding:"8px 10px",fontSize:12,fontWeight:700,color:m.lucro>=0?C.dourado:C.vermelho}}>{m.r>0||m.d>0?fmtBRL(m.lucro):"—"}</td>
              <td style={{padding:"8px 10px",fontSize:11,color:C.oliva}}>{m.r>0?`${Math.round((m.lucro/m.r)*100)}%`:"—"}</td>
            </tr>)}</tbody>
          </table>
        </Card>
      </div>}

      {tab==="cx"&&<div>
        <h3 style={{fontSize:15,marginBottom:12}}>Fluxo de caixa por conta</h3>

        </div>
        <Card style={{padding:0,overflow:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:400}}>
            <thead><tr style={{background:C.linho}}>{["Data","Descrição","Conta","Tipo","Valor"].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"left",fontSize:10,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",color:C.oliva,borderBottom:`1px solid ${C.areia}`}}>{h}</th>)}</tr></thead>
            <tbody>{finance.filter(f=>f.contaId).sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(f=>{const conta=contas.find(c=>c.id===f.contaId);return(<tr key={f.id} style={{borderBottom:`1px solid ${C.linho}`}}>
              <td style={{padding:"8px 10px",fontSize:12,color:C.oliva,whiteSpace:"nowrap"}}>{fmtDate(f.date)}</td>
              <td style={{padding:"8px 10px",fontSize:12,fontWeight:600}}>{f.desc}</td>
              <td style={{padding:"8px 10px",fontSize:11,color:C.oliva}}>{conta?.nome||"—"}</td>

            </tr>);})}
            </tbody>
          </table>
        </Card>
      </div>}

      {tab==="div"&&<div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontStyle:"italic",color:C.oliva,marginBottom:14}}>Receitas recebidas hoje: <b>{fmtBRL(recHoje)}</b></div>

        <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
          {[{l:"💸 Despesas (55%)",v:recHoje*0.55,d:"Reserve para custos da loja"},{l:"📈 Investimentos (10%)",v:recHoje*0.10,d:"Guarde para crescer"},{l:"🤎 Para você (35%)",v:recHoje*0.35,d:"Seu pagamento imediato"}].map(k=>(
            <Card key={k.l} style={{flex:"1 1 170px",textAlign:"center"}}><div style={{fontSize:13,fontWeight:700,color:C.cafe,marginBottom:6}}>{k.l}</div><div style={{fontSize:26,fontFamily:"'Playfair Display',serif",color:C.dourado,fontWeight:700}}>{fmtBRL(k.v)}</div><div style={{fontSize:11,color:C.oliva,marginTop:5,fontStyle:"italic"}}>{k.d}</div></Card>
          ))}
        </div>}
      </div>}

      {formModal&&<Modal title="Novo Lançamento" onClose={()=>setFormModal(false)}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div><label style={{fontSize:11,fontWeight:600,letterSpacing:"0.8px",color:C.oliva,textTransform:"uppercase",display:"block",marginBottom:6}}>Tipo</label>
            <div style={{display:"flex",gap:8}}>{["receita","despesa"].map(t=><button key={t} onClick={()=>setForm(f=>({...f,type:t}))} style={{flex:1,padding:"8px",borderRadius:4,border:`2px solid ${form.type===t?(t==="receita"?C.oliva:C.vermelho):C.areia}`,background:form.type===t?(t==="receita"?"#D4E8D4":"#FEE"):"transparent",fontSize:13,fontWeight:700,color:form.type===t?(t==="receita"?"#2E6B2E":C.vermelho):C.oliva,cursor:"pointer"}}>{t==="receita"?"+ Receita":"- Despesa"}</button>)}

// ─── METAS ────────────────────────────────────────────────────────────────────
const Metas = ({finance,orders,metas,setMetas}) => {
  const anoAtual=new Date().getFullYear();
  const [anoSel,setAnoSel]=useState(anoAtual);
  const [editando,setEditando]=useState(false);
  const metaAno=metas.find(m=>m.ano===anoSel)||{ano:anoSel,faturamentoMensal:3000,encomendas:10,produtosVendidos:15,investimentoAnual:10000};
  const [form,setForm]=useState(metaAno);

  useEffect(()=>{const m=metas.find(x=>x.ano===anoSel)||{ano:anoSel,faturamentoMensal:3000,encomendas:10,produtosVendidos:15,investimentoAnual:10000};setForm(m);},[anoSel,metas]);

  const mesAtual=today.slice(0,7);
  const fatMes=finance.filter(f=>f.type==="receita"&&f.date?.startsWith(mesAtual)).reduce((a,f)=>a+f.value,0);
  const encMes=orders.filter(o=>o.dataCompra?.startsWith(mesAtual)&&o.status!=="Cancelado").length;
  const invAno=finance.filter(f=>f.centrocusto==="Investimentos"&&f.date?.startsWith(String(anoSel))).reduce((a,f)=>a+f.value,0);

  const salvar=()=>{setMetas(prev=>[...prev.filter(m=>m.ano!==anoSel),{...form,ano:anoSel}]);setEditando(false);};

  const MetaCard=({icon,label,meta,real,fmt,cor})=>{
    const pct=meta>0?Math.min(100,(real/meta)*100):0;
    return(
      <Card style={{flex:"1 1 200px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div><div style={{fontSize:18}}>{icon}</div><div style={{fontSize:13,fontWeight:700,color:C.cafe,marginTop:1}}>{label}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:20,fontFamily:"'Playfair Display',serif",fontWeight:700,color:cor||C.dourado}}>{fmt(real)}</div><div style={{fontSize:11,color:C.oliva}}>de {fmt(meta)}</div></div>
        </div>
        <PBar pct={pct} color={pct>=100?C.verde:pct>=70?C.dourado:pct>=40?C.oliva:C.areia}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
          <span style={{fontSize:11,color:C.oliva}}>{pct.toFixed(0)}% atingido</span>
          {pct>=100?<span style={{fontSize:11,fontWeight:700,color:C.verde}}>✓ Meta atingida!</span>:<span style={{fontSize:11,color:C.oliva}}>Falta {fmt(Math.max(0,meta-real))}</span>}
        </div>
      </Card>
    );
  };

  return(
    <div className="fade" style={{padding:24}}>
      <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
        <h3 style={{flex:1,fontSize:18}}>Gestão de Metas</h3>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <label style={{fontSize:12,color:C.oliva}}>Ano:</label>
          <input type="number" value={anoSel} onChange={e=>setAnoSel(Number(e.target.value))} style={{width:78,padding:"6px 10px",border:`1.5px solid ${C.areia}`,borderRadius:3,fontSize:13,color:C.cafe}}/>
        </div>
        <Btn sm v="ghost" onClick={()=>{setForm(metaAno);setEditando(true);}}>✎ Editar metas</Btn>
      </div>
      <div style={{background:`linear-gradient(135deg,${C.cafe},#3D2B1F)`,borderRadius:8,padding:"12px 18px",marginBottom:18,display:"flex",gap:12,alignItems:"center"}}>
        <div style={{fontSize:22}}>🎯</div>
        <div><div style={{fontSize:10,color:C.dourado,letterSpacing:"2px",textTransform:"uppercase",fontWeight:700}}>Mês atual — {new Date().toLocaleDateString("pt-BR",{month:"long",year:"numeric"})}</div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:14,color:"#FAF8F5",fontStyle:"italic",marginTop:1}}>Acompanhe seu progresso em tempo real ✦</div></div>
      </div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}}>
        <MetaCard icon="💰" label="Faturamento mensal" meta={metaAno.faturamentoMensal} real={fatMes} fmt={fmtBRL} cor={C.dourado}/>
        <MetaCard icon="📦" label="Encomendas no mês" meta={metaAno.encomendas} real={encMes} fmt={v=>String(Math.round(v))} cor={C.cafe}/>
      </div>
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div><div style={{fontSize:14,fontWeight:700,color:C.cafe}}>📈 Meta anual de investimentos — {anoSel}</div><div style={{fontSize:11,color:C.oliva,marginTop:1}}>Alimentado automaticamente pelos lançamentos em "Investimentos"</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:22,fontFamily:"'Playfair Display',serif",fontWeight:700,color:C.oliva}}>{fmtBRL(invAno)}</div><div style={{fontSize:11,color:C.oliva}}>de {fmtBRL(metaAno.investimentoAnual)}</div></div>
        </div>
        <PBar pct={metaAno.investimentoAnual>0?(invAno/metaAno.investimentoAnual)*100:0} color={C.oliva} h={12}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
          <span style={{fontSize:11,color:C.oliva}}>{metaAno.investimentoAnual>0?((invAno/metaAno.investimentoAnual)*100).toFixed(1):0}% da meta</span>
          <span style={{fontSize:11,color:C.oliva}}>Falta {fmtBRL(Math.max(0,metaAno.investimentoAnual-invAno))}</span>
        </div>
      </Card>
      {metas.length>1&&<Card style={{marginTop:14}}>
        <h3 style={{fontSize:14,marginBottom:10}}>Metas anteriores</h3>
        {metas.filter(m=>m.ano!==anoSel).sort((a,b)=>b.ano-a.ano).map(m=><div key={m.ano} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${C.linho}`,cursor:"pointer"}} onClick={()=>setAnoSel(m.ano)}>
          <span style={{fontSize:13,fontWeight:600}}>{m.ano}</span>
          <span style={{fontSize:11,color:C.oliva}}>{fmtBRL(m.faturamentoMensal)}/mês · inv: {fmtBRL(m.investimentoAnual)}/ano</span>
        </div>)}
      </Card>}
      {editando&&<Modal title={`Metas — ${anoSel}`} onClose={()=>setEditando(false)}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Inp label="Meta de faturamento mensal (R$)" type="number" value={form.faturamentoMensal} onChange={v=>setForm(f=>({...f,faturamentoMensal:Number(v)}))}/>
          <Inp label="Meta de encomendas por mês" type="number" value={form.encomendas} onChange={v=>setForm(f=>({...f,encomendas:Number(v)}))}/>
          <Inp label="Meta anual de investimentos (R$)" type="number" value={form.investimentoAnual} onChange={v=>setForm(f=>({...f,investimentoAnual:Number(v)}))}/>
        </div>
        <div style={{display:"flex",gap:10,marginTop:14,justifyContent:"flex-end"}}><Btn v="ghost" onClick={()=>setEditando(false)}>Cancelar</Btn><Btn onClick={salvar}>Salvar</Btn></div>
      </Modal>}
    </div>
  );
};

// ─── RELATÓRIOS ───────────────────────────────────────────────────────────────
const Reports = ({orders,products,finance,clients}) => {
  const fatTotal=orders.filter(o=>o.status!=="Cancelado").reduce((a,o)=>a+(o.precoFinal||o.price||0),0);
  const recTotal=orders.reduce((a,o)=>a+(o.valorPago||0),0);
  const avgTicket=orders.filter(o=>o.status!=="Cancelado").length>0?fatTotal/orders.filter(o=>o.status!=="Cancelado").length:0;
  const despTotal=finance.filter(f=>f.type==="despesa").reduce((a,f)=>a+f.value,0);
  const invTotal=finance.filter(f=>f.centrocusto==="Investimentos").reduce((a,f)=>a+f.value,0);
  const origens=clients.reduce((acc,c)=>{if(c.origem)acc[c.origem]=(acc[c.origem]||0)+1;return acc;},{});
  const hasData=orders.length>0||finance.length>0;
  return(
    <div className="fade" style={{padding:24}}>
      {!hasData?<div style={{textAlign:"center",padding:"60px 20px",color:C.oliva,fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:15}}>Os relatórios serão preenchidos conforme você lançar pedidos e vendas ✦</div>:(
      <>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:18}}>
          {[{l:"Ticket médio",v:fmtBRL(avgTicket),c:C.dourado},{l:"Total pedidos",v:orders.filter(o=>o.status!=="Cancelado").length,c:C.cafe},{l:"Clientes VIP",v:clients.filter(c=>c.vip).length,c:C.oliva},{l:"Margem",v:`${fatTotal>0?Math.round(((fatTotal-despTotal)/fatTotal)*100):0}%`,c:C.cafe}].map(k=>(
            <Card key={k.l} style={{flex:"1 1 110px",textAlign:"center"}}><div style={{fontSize:22,fontFamily:"'Playfair Display',serif",color:k.c}}>{k.v}</div><div style={{fontSize:10,color:C.oliva,letterSpacing:"1px",textTransform:"uppercase",marginTop:2}}>{k.l}</div></Card>
          ))}
        </div>
        <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
          <Card style={{flex:1,minWidth:200}}>
            <h3 style={{fontSize:14,marginBottom:12}}>Resumo financeiro</h3>
            {[["Total faturado",fmtBRL(fatTotal)],["Total recebido",fmtBRL(recTotal)],["A receber",fmtBRL(Math.max(0,fatTotal-recTotal))],["Total despesas",fmtBRL(despTotal)],["Lucro estimado",fmtBRL(fatTotal-despTotal)],["Investimentos",fmtBRL(invTotal)]].map(([l,v])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.linho}`}}><span style={{fontSize:12,color:C.oliva}}>{l}</span><span style={{fontSize:13,fontWeight:700}}>{v}</span></div>
            ))}

// ─── MONITOR DE ARMAZENAMENTO ─────────────────────────────────────────────────
const StorageMonitor = () => {
  const [info, setInfo] = useState(null);
  useEffect(() => {
    try {
      let total = 0;
      const keys = [];
      for (let k in localStorage) {
        if (!localStorage.hasOwnProperty(k)) continue;
        const size = (localStorage[k].length * 2) / 1024;
        if (k.startsWith("atelie_") && !k.endsWith("_bk")) {
          keys.push({k: k.replace("atelie_",""), size: size.toFixed(1)});
          total += size;
        }
      }
      setInfo({total: total.toFixed(0), keys, limite: 5120, pct: Math.round((total/5120)*100)});
    } catch { setInfo(null); }
  }, []);

  if (!info) return null;
  const cor = info.pct > 80 ? C.vermelho : info.pct > 50 ? C.dourado : C.verde;
  return (
    <div style={{background:C.branco,borderRadius:6,padding:"10px 12px",marginBottom:4}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
        <span style={{fontSize:12,fontWeight:700,color:C.cafe}}>Espaço utilizado</span>
        <span style={{fontSize:12,fontWeight:700,color:cor}}>{info.total} KB de 5.120 KB ({info.pct}%)</span>
      </div>
      <PBar pct={info.pct} color={cor} h={6}/>
      {info.pct > 70 && <div style={{fontSize:11,color:C.vermelho,marginTop:6,fontWeight:600}}>⚠ Espaço quase cheio! Faça backup e evite adicionar muitas fotos em alta resolução.</div>}
      {info.pct <= 70 && <div style={{fontSize:11,color:C.oliva,marginTop:6}}>✓ Espaço disponível para seus dados.</div>}
    </div>
  );
};

  const p=products.find(x=>x.name===order?.product);
  const pF=order?.precoFinal||order?.price||0;

  if(!order)return null;
