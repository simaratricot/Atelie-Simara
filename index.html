// ─── COMPRA PELO CATÁLOGO ─────────────────────────────────────────────────────
const CompraModal = ({produto,orders=[],setOrders,clients=[],setClients,config={},onClose}) => {
  const [step,setStep]=useState("opcoes");
  const [sel,setSel]=useState({tamanho:"",cor:""});
  const [dados,setDados]=useState({nome:"",phone:"",endereco:"",cep:"",nascimento:"",origem:"Instagram"});
  const [pag,setPag]=useState({tipo:"PIX",parcelas:1});
  const [entrega,setEntrega]=useState({tipo:"Correios",frete:0,prazo:""});
  const [cepLoad,setCepLoad]=useState(false);
  const [done,setDone]=useState(null);

  const preco=(()=>{
    if(produto.valorPorTamanho?.length>0&&sel.tamanho){const vt=produto.valorPorTamanho.find(v=>v.tamanho===sel.tamanho);if(vt)return vt.preco;}
    return produto.price||0;
  })();
  const total=preco+(entrega.frete||0);
  const taxa=0.0499;

  const buscarCEP=async cep=>{
    const c=cep.replace(/\D/g,"");
    if(c.length!==8)return;
    setCepLoad(true);
    try{
      const r=await fetch(`https://viacep.com.br/ws/${c}/json/`);
      const d=await r.json();
      if(!d.erro)setDados(p=>({...p,endereco:`${d.logradouro}, ${d.bairro}, ${d.localidade} - ${d.uf}`}));
      const fr=c.startsWith("13465")||c.startsWith("13464")?15:c.startsWith("13")?12:c.startsWith("01")||c.startsWith("02")?18:22;
      setEntrega(e=>({...e,frete:fr,prazo:fr===15?"Entrega em Americana":"5 a 10 dias úteis (Correios)"}));
    }catch{}
    setCepLoad(false);
  };

  const finalizar=()=>{
    const pos=(orders||[]).filter(o=>!["Concluído","Cancelado","Enviado"].includes(o.status)).length+1;
    const id=`EN-${String((orders||[]).length+1).padStart(3,"0")}`;
    const dias=calcDays(produto.hours||7)+(produto.buffer||2)+1;
    const del=addDays(today,dias);
    const novo={id,client:dados.nome,phone:dados.phone,origem:dados.origem||"Instagram",product:produto.name,color:sel.cor||"—",size:sel.tamanho||"—",measures:"",price:total,precoFinal:total,desconto:0,dataCompra:today,delivery:del,status:"Pedido recebido",valorPago:0,note:`Frete: ${fmtBRL(entrega.frete)} · ${entrega.prazo}`,tracking:"",payment:pag.tipo==="PIX"?"PIX":pag.tipo==="Cartao"?`Cartão ${pag.parcelas}x`:"Boleto",condicao:"À vista",entrada:0,parcelas:[],position:pos,read:false,endereco:dados.endereco,cep:dados.cep,nascimento:dados.nascimento,historicoPagamentos:[]};
    if(setOrders)setOrders(prev=>reorderQ([...(prev||[]),novo]));
    if(dados.nome&&setClients&&!(clients||[]).find(c=>c.name===dados.nome)){
      setClients(prev=>[...(prev||[]),{id:uid(),name:dados.nome,phone:dados.phone,email:"",city:"",orders:1,total,vip:false,joined:today,origem:"Divulgação"}]);
    }
    const msg=`🤎 *Novo pedido pelo catálogo!*\n\nPedido: ${id}\nCliente: ${dados.nome}\nWhatsApp: ${dados.phone}\nProduto: ${produto.name}\nCor: ${sel.cor||"—"} · Tamanho: ${sel.tamanho||"—"}\nEndereço: ${dados.endereco}\nPagamento: ${novo.payment}\nProduto: ${fmtBRL(preco)}\nFrete: ${fmtBRL(entrega.frete)}\nTotal: ${fmtBRL(total)}\nEntrega: ${entrega.prazo}\nFila: ${pos}ª · Previsão: ${fmtDate(del)}\n\n${BRAND}`;
    window.open(`https://wa.me/${config.whatsapp}?text=${waMsg(msg)}`);
    setDone(novo);setStep("done");
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(92,64,51,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16,overflowY:"auto"}}>
      <div style={{background:C.branco,borderRadius:10,width:"100%",maxWidth:460,maxHeight:"95vh",overflowY:"auto"}}>
        <div style={{background:`linear-gradient(135deg,${C.cafe},#3D2B1F)`,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#FAF8F5"}}>{produto.name}</div><div style={{fontSize:11,color:C.areia,marginTop:1}}>{step==="opcoes"?"Escolha":"Dados"==="dados"?"Seus dados":step==="pag"?"Pagamento":step==="entrega"?"Entrega":step==="done"?"Pedido confirmado":"Opções"}</div></div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#FAF8F5",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{padding:"18px"}}>
          {step==="opcoes"&&<>
            {produto.photos?.[0]&&<div style={{height:130,borderRadius:6,overflow:"hidden",marginBottom:14}}><img src={produto.photos[0]} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
            <div style={{fontSize:18,fontFamily:"'Playfair Display',serif",color:C.dourado,fontWeight:700,marginBottom:12}}>{fmtBRL(preco)}</div>
            {produto.tamanhos?.length>0&&<><Divider label="Tamanho"/>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
                {produto.tamanhos.map(t=>{const vt=produto.valorPorTamanho?.find(v=>v.tamanho===t);return(
                  <button key={t} onClick={()=>setSel(s=>({...s,tamanho:t}))} style={{padding:"8px 14px",borderRadius:4,border:`2px solid ${sel.tamanho===t?C.cafe:C.areia}`,background:sel.tamanho===t?C.cafe:"transparent",color:sel.tamanho===t?"#fff":C.cafe,fontSize:13,fontWeight:700,cursor:"pointer"}}>{t}{vt?` — ${fmtBRL(vt.preco)}`:""}</button>
                );})}
              </div>
            </>}
            {produto.cores?.length>0&&<><Divider label="Cor"/>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
                {produto.cores.map(c=><div key={c.id} onClick={()=>setSel(s=>({...s,cor:c.nome}))} style={{display:"flex",alignItems:"center",gap:7,padding:"6px 12px",borderRadius:6,border:`2px solid ${sel.cor===c.nome?C.cafe:C.areia}`,background:sel.cor===c.nome?C.linho:"transparent",cursor:"pointer"}}>
                  {c.foto&&<div style={{width:26,height:26,borderRadius:"50%",overflow:"hidden",flexShrink:0}}><img src={c.foto} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
                  <span style={{fontSize:12,fontWeight:sel.cor===c.nome?700:400,color:C.cafe}}>{c.nome}</span>
                </div>)}
              </div>
            </>}
            <Btn full onClick={()=>setStep("dados")} disabled={produto.tamanhos?.length>0&&!sel.tamanho}>Continuar →</Btn>
          </>}

          {step==="dados"&&<>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <Inp label="Nome completo" value={dados.nome} onChange={v=>setDados(d=>({...d,nome:v}))}/>
              <Inp label="WhatsApp" value={dados.phone} onChange={v=>setDados(d=>({...d,phone:v}))} placeholder="(11) 99999-9999"/>
              <div style={{display:"flex",gap:8}}>
                <div style={{flex:1}}><Inp label="CEP" value={dados.cep} onChange={v=>{setDados(d=>({...d,cep:v}));if(v.replace(/\D/g,"").length===8)buscarCEP(v);}}/></div>
                {cepLoad&&<div style={{fontSize:11,color:C.oliva,alignSelf:"flex-end",paddingBottom:4}}>Buscando...</div>}
              </div>
              <Inp label="Endereço" value={dados.endereco} onChange={v=>setDados(d=>({...d,endereco:v}))} rows={2}/>
              <Inp label="Data de nascimento" type="date" value={dados.nascimento} onChange={v=>setDados(d=>({...d,nascimento:v}))}/>
              <Sel label="Como conheceu a loja?" value={dados.origem} onChange={v=>setDados(d=>({...d,origem:v}))} options={ORIGENS}/>
            </div>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <Btn v="ghost" onClick={()=>setStep("opcoes")}>← Voltar</Btn>
              <Btn full onClick={()=>setStep("pag")} disabled={!dados.nome||!dados.phone}>Continuar →</Btn>
            </div>
          </>}

          {step==="pag"&&<>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {["PIX","Boleto","Cartao"].map(t=><button key={t} onClick={()=>setPag(p=>({...p,tipo:t}))} style={{flex:1,padding:"9px",borderRadius:4,border:`2px solid ${pag.tipo===t?C.cafe:C.areia}`,background:pag.tipo===t?C.cafe:"transparent",color:pag.tipo===t?"#fff":C.cafe,fontSize:12,fontWeight:700,cursor:"pointer"}}>{t==="Cartao"?"Cartão":t}</button>)}
            </div>
            {pag.tipo==="PIX"&&<div style={{background:C.linho,borderRadius:8,padding:"14px",textAlign:"center"}}>
              <div style={{fontSize:26,marginBottom:8}}>💚</div>
              <div style={{fontSize:12,color:C.oliva,marginBottom:5}}>Chave PIX (CPF)</div>
              <div style={{fontSize:17,fontWeight:700,color:C.cafe,letterSpacing:"1px",marginBottom:3}}>{WHATSAPP_PIX}</div>
              <div style={{fontSize:13,color:C.cafe,marginBottom:3}}>{NOME_PIX}</div>
              <div style={{fontSize:12,color:C.oliva,marginBottom:8}}>Banco: Mercado Pago</div>
              <div style={{background:"#FEF3E9",borderRadius:6,padding:"9px 12px",fontSize:12,color:"#9A6B40",textAlign:"left"}}>⚠ Envie o comprovante junto com o pedido para facilitar a identificação.</div>
            </div>}
            {pag.tipo==="Boleto"&&<div style={{background:C.linho,borderRadius:8,padding:"14px",textAlign:"center"}}>
              <div style={{fontSize:26,marginBottom:6}}>🧾</div>
              <div style={{fontSize:13,color:C.cafe}}>O boleto será enviado após a confirmação do pedido.</div>
            </div>}
            {pag.tipo==="Cartao"&&<div style={{background:C.linho,borderRadius:8,padding:"14px"}}>
              <div style={{fontSize:13,fontWeight:600,color:C.cafe,marginBottom:10}}>Número de parcelas:</div>
              <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:10}}>
                {[1,2,3,4,5,6].map(n=><button key={n} onClick={()=>setPag(p=>({...p,parcelas:n}))} style={{padding:"7px 12px",borderRadius:4,border:`2px solid ${pag.parcelas===n?C.cafe:C.areia}`,background:pag.parcelas===n?C.cafe:"transparent",color:pag.parcelas===n?"#fff":C.cafe,fontSize:12,fontWeight:700,cursor:"pointer"}}>{n}x</button>)}
              </div>
              <div style={{background:"#fff",borderRadius:6,padding:"9px 12px"}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{color:C.oliva}}>Total c/ taxa (4,99%)</span><span style={{fontWeight:700}}>{fmtBRL(total*(1+taxa))}</span></div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:700}}><span>{pag.parcelas}x de</span><span style={{color:C.dourado}}>{fmtBRL(total*(1+taxa)/pag.parcelas)}</span></div>
              </div>
            </div>}
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <Btn v="ghost" onClick={()=>setStep("dados")}>← Voltar</Btn>
              <Btn full onClick={()=>setStep("entrega")}>Continuar →</Btn>
            </div>
          </>}

          {step==="entrega"&&<>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {["Retirar","Americana","Correios"].map(t=><button key={t} onClick={()=>setEntrega(e=>({...e,tipo:t,frete:t==="Retirar"?0:t==="Americana"?15:e.frete}))} style={{flex:1,padding:"8px",borderRadius:4,border:`2px solid ${entrega.tipo===t?C.cafe:C.areia}`,background:entrega.tipo===t?C.cafe:"transparent",color:entrega.tipo===t?"#fff":C.cafe,fontSize:11,fontWeight:700,cursor:"pointer"}}>{t}</button>)}
            </div>
            {entrega.tipo==="Retirar"&&<div style={{background:C.linho,borderRadius:6,padding:"12px",fontSize:13,color:C.cafe,marginBottom:10}}>Combinaremos o local e horário de retirada pelo WhatsApp. Sem frete!</div>}
            {entrega.tipo==="Americana"&&<div style={{background:C.linho,borderRadius:6,padding:"12px",marginBottom:10}}><div style={{fontSize:13,fontWeight:600,color:C.cafe}}>Entrega em Americana — SP</div><div style={{fontSize:14,color:C.dourado,fontWeight:700,marginTop:3}}>Taxa fixa: R$ 15,00</div></div>}
            {entrega.tipo==="Correios"&&<div style={{background:C.linho,borderRadius:6,padding:"12px",marginBottom:10}}>
              <div style={{fontSize:13,fontWeight:600,color:C.cafe,marginBottom:8}}>Frete pelos Correios — Todo Brasil</div>
              <Inp label="CEP de entrega" value={dados.cep} onChange={v=>{setDados(d=>({...d,cep:v}));if(v.replace(/\D/g,"").length===8)buscarCEP(v);}}/>
              {entrega.prazo&&<div style={{marginTop:6,fontSize:12,color:C.cafe}}>✓ {entrega.prazo} — <b>{fmtBRL(entrega.frete)}</b></div>}
            </div>}
            <div style={{background:C.linho,borderRadius:6,padding:"12px",marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{color:C.oliva}}>Produto</span><span>{fmtBRL(preco)}</span></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{color:C.oliva}}>Frete</span><span>{fmtBRL(entrega.frete)}</span></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:15,fontWeight:700,paddingTop:6,borderTop:`1px solid ${C.areia}`}}><span>Total</span><span style={{color:C.dourado}}>{fmtBRL(total)}</span></div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn v="ghost" onClick={()=>setStep("pag")}>← Voltar</Btn>
              <Btn full v="gold" onClick={finalizar}>🤎 Confirmar pedido</Btn>
            </div>
          </>}

          {step==="done"&&done&&<div style={{textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:10}}>🤎</div>
            <h3 style={{fontSize:18,marginBottom:7}}>Pedido confirmado!</h3>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontStyle:"italic",color:C.oliva,lineHeight:1.6,marginBottom:14}}>Obrigada por escolher uma peça feita à mão com amor e significado.</p>
            <div style={{background:C.linho,borderRadius:8,padding:"14px",textAlign:"left",marginBottom:14}}>
              {[["Pedido",done.id],["Produto",done.product],["Cor",done.color],["Tamanho",done.size],["Posição na fila",`${done.position}ª`],["Previsão",fmtDate(done.delivery)],["Total",fmtBRL(done.price)]].map(([l,v])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:`1px solid ${C.areia}`}}><span style={{fontSize:12,color:C.oliva}}>{l}</span><span style={{fontSize:13,fontWeight:700}}>{v}</span></div>
              ))}
            </div>
            <Btn full onClick={onClose}>Fechar</Btn>
          </div>}
        </div>
      </div>
    </div>
  );
};

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
export default function App() {
  const isLoja = typeof window!=="undefined" && new URLSearchParams(window.location.search).get("loja")==="1";
  const [view,setView]=useState("dashboard");
  const [menuOpen,setMenuOpen]=useState(false);
  const [fichaModal,setFichaModal]=useState(null);
  const [saved,setSaved]=useState(false);
  const showSaved=useCallback(()=>{setSaved(true);setTimeout(()=>setSaved(false),1500);},[]);

  // Todos os dados com persistência garantida
  const [products,  setProductsRaw  ]=useStorage("products",   INIT.products);
  const [orders,    setOrdersRaw    ]=useStorage("orders",      INIT.orders);
  const [clients,   setClientsRaw   ]=useStorage("clients",     INIT.clients);
  const [stockSup,  setStockSupRaw  ]=useStorage("stockSup",    INIT.stockSup);
  const [finance,   setFinanceRaw   ]=useStorage("finance",     INIT.finance);
  const [contas,    setContasRaw    ]=useStorage("contas",      INIT.contas);
  const [frases,    setFrasesRaw    ]=useStorage("frases",      INIT.frases);
  const [banners,   setBannersRaw   ]=useStorage("banners",     INIT.banners);
  const [depoimentos,setDeposRaw   ]=useStorage("depoimentos", INIT.depoimentos);
  const [categories,setCatsRaw     ]=useStorage("categories",  INIT.categories);
  const [projects,  setProjectsRaw  ]=useStorage("projects",    INIT.projects);
  const [metas,     setMetasRaw     ]=useStorage("metas",       INIT.metas);
  const [config,    setConfigRaw    ]=useStorage("config",      INIT.config);

  // Usar os setters diretos do useStorage — sem camadas intermediárias
  const setProducts    = setProductsRaw;
  const setOrders      = setOrdersRaw;
  const setClients     = setClientsRaw;
  const setStockSup    = setStockSupRaw;
  const setFinance     = setFinanceRaw;
  const setContas      = setContasRaw;
  const setFrases      = setFrasesRaw;
  const setBanners     = setBannersRaw;
  const setDepoimentos = setDeposRaw;
  const setCategories  = setCatsRaw;
  const setProjects    = setProjectsRaw;
  const setMetas       = setMetasRaw;
  const setConfig      = setConfigRaw;

  const allData={products,orders,clients,stockSup,finance,contas,frases,banners,depoimentos,categories,projects,metas,config};

  const copyLink=()=>{
    const link=`${window.location.origin}/?loja=1`;
    navigator.clipboard.writeText(link).then(()=>alert(`Link copiado!\n${link}\n\nEnvie esse link para suas clientes.`));
  };

  const TITLES={
    dashboard:["Bem-vinda ✦",new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"})],
    site:["Catálogo","Como a cliente vê o catálogo"],
    products:["Produtos","Catálogo e precificação"],
    orders:["Encomendas","Gestão de pedidos"],
    production:["Produção","Fila e capacidade"],
    stock:["Estoque","Materiais e peças prontas"],
    finance:["Financeiro","Receitas, despesas e fluxo de caixa"],
    metas:["Gestão de Metas","Acompanhe seu progresso"],
    clients:["Clientes","Relacionamento e histórico"],
    projects:["Projetos & Sonhos","Planos e inspirações"],
    reports:["Relatórios","Análises e insights"],
    config:["Configurações","Personalização do sistema"],
  };
  const [title,subtitle]=TITLES[view]||["",""];

  // Modo loja: só mostra o catálogo público
  if(isLoja){
    return <div><GS/><SitePublico products={products} banners={banners} depoimentos={depoimentos} categories={categories} config={config} contas={contas} orders={orders} setOrders={setOrders} clients={clients} setClients={setClients}/></div>;
  }

  return (
    <div style={{display:"flex",minHeight:"100vh",background:C.linho}}>
      <GS/>
      {/* SIDEBAR DESKTOP */}
      <div className="hide-desk" style={{display:"block"}}>
        <style>{`.hide-desk{display:block!important;}@media(max-width:768px){.hide-desk{display:none!important;}}`}</style>
        <Sidebar active={view} setActive={setView} orders={orders}/>
      </div>
      {/* SIDEBAR MOBILE */}
      {menuOpen&&<div style={{position:"fixed",inset:0,zIndex:99}}>
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.4)"}} onClick={()=>setMenuOpen(false)}/>
        <div style={{position:"relative",width:240,height:"100%"}}>
          <Sidebar active={view} setActive={setView} orders={orders} mobile onClose={()=>setMenuOpen(false)}/>
        </div>
      </div>}
      <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:"100vh",minWidth:0}}>
        {/* TOPBAR */}
        <div style={{background:C.branco,borderBottom:`1px solid ${C.areia}`,padding:"11px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={()=>setMenuOpen(true)} style={{display:"none",background:"none",border:"none",fontSize:20,color:C.cafe,cursor:"pointer"}} className="mob-menu">☰</button>
            <style>{`@media(max-width:768px){.mob-menu{display:flex!important;}}`}</style>
            <div>
              <h2 style={{fontSize:16,fontWeight:700,color:C.cafe,lineHeight:1.2}}>{title}</h2>
              {subtitle&&<div style={{fontSize:11,color:C.oliva,fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic"}}>{subtitle}</div>}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {saved&&<span style={{fontSize:11,color:C.oliva,fontStyle:"italic"}}>✓ Salvo!</span>}
            <Btn sm v="ghost" onClick={copyLink} style={{fontSize:11}}>🔗 Link da loja</Btn>
            <div style={{width:28,height:28,borderRadius:"50%",background:C.dourado,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,fontWeight:700,flexShrink:0}}>S</div>
          </div>
        </div>
        {/* CONTEÚDO */}
        <div style={{flex:1,overflowY:"auto"}}>
          {view==="dashboard"   &&<Dashboard orders={orders} finance={finance} stockSup={stockSup} frases={frases}/>}
          {view==="site"        &&<SitePublico products={products} banners={banners} depoimentos={depoimentos} categories={categories} config={config} contas={contas} orders={orders} setOrders={setOrders} clients={clients} setClients={setClients}/>}
          {view==="products"    &&<Products products={products} setProducts={setProducts} categories={categories} config={config} stockSup={stockSup}/>}
          {view==="orders"      &&<Orders orders={orders} setOrders={setOrders} products={products} config={config} onFicha={o=>setFichaModal(o)} clients={clients} setClients={setClients} finance={finance} setFinance={setFinance} contas={contas} setContas={setContas}/>}
          {view==="production"  &&<Production orders={orders} products={products}/>}
          {view==="stock"       &&<Stock stockSup={stockSup} setStockSup={setStockSup} products={products} setProducts={setProducts}/>}
          {view==="finance"     &&<Finance finance={finance} setFinance={setFinance} orders={orders} contas={contas} setContas={setContas}/>}
          {view==="metas"       &&<Metas finance={finance} orders={orders} metas={metas} setMetas={setMetas}/>}
          {view==="clients"     &&<Clients clients={clients} setClients={setClients} orders={orders} config={config}/>}
          {view==="projects"    &&<Projects projects={projects} setProjects={setProjects}/>}
          {view==="reports"     &&<Reports orders={orders} products={products} finance={finance} clients={clients}/>}
          {view==="config"      &&<Config config={config} setConfig={setConfig} frases={frases} setFrases={setFrases} banners={banners} setBanners={setBanners} depoimentos={depoimentos} setDepoimentos={setDepoimentos} categories={categories} setCategories={setCategories} allData={allData}/>}
        </div>
      </div>
      {fichaModal&&<FichaPedido order={fichaModal} products={products} config={config} onClose={()=>setFichaModal(null)}/>}
    </div>
  );
}

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
    document.getElementById('loading').style.display = 'none';
  </script>
</body>
</html>
